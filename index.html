<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>📺 TiViM - IPTV Player</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#6c5ce7;--primary-dark:#5a4bd1;--bg-dark:#0a0a1a;--bg-card:#141428;--bg-sidebar:rgba(10,10,26,0.95);--bg-sidebar-transparent:rgba(10,10,26,0.75);--text:#e0e0e0;--text-dim:#8888aa;--accent:#00cec9;--danger:#ff6b6b;--success:#00b894;--border:rgba(108,92,231,0.3);--glow:rgba(108,92,231,0.5)}
        body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg-dark);color:var(--text);overflow:hidden;height:100vh;width:100vw}
        #loadingScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10000;transition:opacity .5s}
        #loadingScreen.hide{opacity:0;pointer-events:none}
        .loader-logo{font-size:64px;margin-bottom:20px;animation:pulse 1.5s infinite}
        .loader-text{font-size:24px;color:var(--primary);margin-bottom:30px;font-weight:700}
        .loader-bar{width:200px;height:4px;background:var(--bg-card);border-radius:2px;overflow:hidden}
        .loader-bar-inner{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:2px;animation:loadProgress 2s ease-in-out forwards}
        @keyframes loadProgress{0%{width:0%}50%{width:70%}100%{width:100%}}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
        #app{display:flex;height:100vh;width:100vw;position:relative}
        #sidebar{position:fixed;left:0;top:0;width:380px;height:100vh;background:var(--bg-sidebar);backdrop-filter:blur(20px);z-index:1000;display:flex;flex-direction:column;transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;border-right:1px solid var(--border);box-shadow:5px 0 30px rgba(0,0,0,.5)}
        #sidebar.hidden{transform:translateX(-100%);opacity:0}
        #sidebar.overlay-mode{background:var(--bg-sidebar-transparent)}
        .sidebar-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;min-height:65px;background:rgba(108,92,231,.1);flex-shrink:0}
        .sidebar-header .logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .sidebar-header .logo span{font-size:28px}
        .header-actions{display:flex;gap:8px}
        .icon-btn{width:36px;height:36px;border:1px solid var(--border);background:rgba(108,92,231,.15);color:var(--text);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s}
        .icon-btn:hover,.icon-btn:focus{background:var(--primary);color:#fff;border-color:var(--primary);outline:none}
        .categories-wrapper{padding:10px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
        .categories-nav-hint{font-size:10px;color:var(--text-dim);margin-bottom:6px;display:flex;align-items:center;gap:6px}
        .categories-nav-hint .hint-key{background:rgba(108,92,231,.2);padding:1px 6px;border-radius:4px;font-size:9px;color:var(--primary);font-weight:700}
        .categories{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none}
        .categories::-webkit-scrollbar{display:none}
        .cat-btn{padding:6px 14px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:20px;color:var(--text-dim);font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
        .cat-btn:hover,.cat-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
        .cat-btn.active{box-shadow:0 0 15px var(--glow)}
        .cat-btn.cat-focused{outline:2px solid var(--accent);outline-offset:2px;box-shadow:0 0 12px rgba(0,206,201,.4)}
        .cat-count{background:rgba(255,255,255,.2);padding:1px 6px;border-radius:10px;font-size:10px;margin-left:4px}
        .channel-list-wrapper{flex:1;overflow:hidden;display:flex;flex-direction:column}
        .channel-count{padding:8px 20px;font-size:12px;color:var(--text-dim);border-bottom:1px solid rgba(255,255,255,.03);flex-shrink:0}
        .channel-list{flex:1;overflow-y:auto;padding:6px 10px}
        .channel-list::-webkit-scrollbar{width:4px}
        .channel-list::-webkit-scrollbar-track{background:transparent}
        .channel-list::-webkit-scrollbar-thumb{background:var(--primary);border-radius:2px}
        .channel-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;cursor:pointer;transition:background .1s,border-color .1s;border:1px solid transparent;margin-bottom:2px}
        .channel-item:hover{background:rgba(108,92,231,.15);border-color:var(--border)}
        .channel-item.active{background:linear-gradient(135deg,rgba(108,92,231,.3),rgba(0,206,201,.15));border-color:var(--primary);box-shadow:0 0 20px rgba(108,92,231,.2)}
        .channel-item.focused{background:rgba(0,206,201,.12);border-color:var(--accent);box-shadow:0 0 12px rgba(0,206,201,.25)}
        .channel-item.active.focused{background:linear-gradient(135deg,rgba(108,92,231,.35),rgba(0,206,201,.2));border-color:var(--accent)}
        .channel-logo{width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;font-size:20px}
        .channel-logo img{width:100%;height:100%;object-fit:contain}
        .channel-info{flex:1;min-width:0}
        .channel-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .channel-group{font-size:11px;color:var(--text-dim);margin-top:2px}
        .channel-num{font-size:11px;color:var(--text-dim);background:rgba(255,255,255,.05);padding:2px 8px;border-radius:6px;font-weight:600}
        #playerArea{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;position:relative;width:100%;height:100vh}
        #videoContainer{width:100%;height:100%;position:relative;background:#000}
        #videoPlayer{width:100%;height:100%;background:#000;object-fit:contain;transform:translateZ(0);-webkit-transform:translateZ(0)}

        /* Video arka plan resmi */
        #videoBgImage{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:1;pointer-events:none;transition:opacity .5s ease}
        #videoBgImage.hide{opacity:0;pointer-events:none}

        #welcomeScreen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.55);z-index:5}
        .welcome-icon{font-size:80px;margin-bottom:20px;animation:float 3s ease-in-out infinite}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        .welcome-title{font-size:28px;font-weight:800;margin-bottom:10px;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .welcome-subtitle{color:var(--text-dim);font-size:16px}
        .welcome-keys{margin-top:30px;display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:650px;padding:0 20px}
        .key-hint{display:flex;align-items:center;gap:8px;color:var(--text-dim);font-size:13px}
        .key-badge{background:rgba(108,92,231,.2);border:1px solid var(--border);padding:4px 10px;border-radius:6px;font-size:12px;color:var(--primary);font-weight:600}

        #channelInfoBar{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent 0%,rgba(0,0,0,.85) 30%,rgba(0,0,0,.95) 100%);padding:40px 30px 24px 30px;z-index:100;display:none;animation:infoBarSlideUp .35s ease}
        @keyframes infoBarSlideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
        .info-bar-content{display:flex;align-items:center;justify-content:space-between;gap:20px}
        .info-bar-left{display:flex;align-items:center;gap:16px;flex:1;min-width:0}
        .info-bar-number{font-size:32px;font-weight:800;color:var(--primary);font-variant-numeric:tabular-nums;flex-shrink:0}
        .info-bar-details{flex:1;min-width:0}
        .info-bar-name{font-size:22px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .info-bar-group{font-size:13px;color:var(--accent);margin-top:2px}
        .info-bar-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
        .info-bar-resolution{display:flex;align-items:center;gap:6px;padding:5px 14px;background:rgba(108,92,231,.25);border:1px solid rgba(108,92,231,.4);border-radius:8px;font-size:13px;color:var(--primary);font-weight:700}
        .info-bar-resolution .res-dot{width:8px;height:8px;border-radius:50%;background:var(--success);animation:blink 1.5s infinite}
        .info-bar-live{display:flex;align-items:center;gap:6px;padding:5px 12px;background:rgba(255,107,107,.2);border:1px solid rgba(255,107,107,.3);border-radius:8px;font-size:12px;color:var(--danger);font-weight:700}
        .info-bar-live .live-dot{width:8px;height:8px;border-radius:50%;background:var(--danger);animation:blink 1s infinite}

        #playerControls{position:absolute;bottom:0;left:0;width:100%;padding:20px 30px;background:linear-gradient(transparent,rgba(0,0,0,.9));display:flex;align-items:center;justify-content:space-between;z-index:90;opacity:0;transition:opacity .3s}
        #playerControls.visible{opacity:1}
        .controls-left,.controls-right{display:flex;align-items:center;gap:12px}
        .ctrl-btn{width:42px;height:42px;border:none;background:rgba(255,255,255,.1);color:#fff;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s}
        .ctrl-btn:hover{background:var(--primary);transform:scale(1.1)}
        .volume-slider{width:80px;height:4px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.2);border-radius:2px;outline:none;cursor:pointer}
        .volume-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--primary);border-radius:50%;cursor:pointer}
        .now-playing-info{display:flex;align-items:center;gap:10px;flex:1;justify-content:center}
        .now-playing-dot{width:8px;height:8px;background:var(--danger);border-radius:50%;animation:blink 1.5s infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
        .now-playing-text{font-size:14px;font-weight:600}
        .now-playing-res{font-size:11px;color:var(--accent);font-weight:600;margin-left:4px}

        #toast{position:fixed;top:30px;right:30px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:14px 20px;z-index:9999;display:none;animation:toastSlideDown .3s ease;box-shadow:0 10px 30px rgba(0,0,0,.3);max-width:300px}
        @keyframes toastSlideDown{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
        .toast-content{display:flex;align-items:center;gap:10px;font-size:14px}
        #bufferingSpinner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;display:none}
        .spinner{width:50px;height:50px;border:3px solid rgba(108,92,231,.2);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        #numberOverlay{position:absolute;top:30px;right:30px;background:rgba(10,10,26,.9);backdrop-filter:blur(15px);padding:16px 24px;border-radius:14px;border:1px solid var(--border);z-index:200;display:none;text-align:center}
        .number-display{font-size:48px;font-weight:800;color:var(--primary);font-variant-numeric:tabular-nums}
        .number-hint{font-size:12px;color:var(--text-dim);margin-top:4px}
        #focusModeIndicator{padding:6px 16px;font-size:11px;color:var(--accent);font-weight:600;background:rgba(0,206,201,.1);border-bottom:1px solid rgba(0,206,201,.2);text-align:center;display:none;flex-shrink:0;white-space:nowrap}
        #focusModeIndicator.show{display:block}
        #mobileMenuBtn{display:none;position:fixed;top:15px;left:15px;z-index:900;width:44px;height:44px;border-radius:12px;background:rgba(10,10,26,.9);border:1px solid var(--border);color:var(--text);font-size:20px;cursor:pointer;align-items:center;justify-content:center;backdrop-filter:blur(10px)}

        /* Loading screen arka plan resmi */
        #loadingScreen{
            background-image:url('https://raw.githubusercontent.com/kadirsener1/tivim/refs/heads/main/bg.jpg');
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
        }
        .loader-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(10,10,26,0.7);display:flex;flex-direction:column;align-items:center;justify-content:center}

        @media(max-width:768px){
            #sidebar{width:100%;border-right:none}
            #mobileMenuBtn{display:flex}
            .sidebar-header{padding:12px 16px;min-height:56px}
            .sidebar-header .logo{font-size:18px}
            .sidebar-header .logo span{font-size:24px}
            .categories-wrapper{padding:8px 12px}
            .categories-nav-hint{display:none}
            .cat-btn{padding:5px 10px;font-size:11px}
            .channel-list{padding:4px 6px}
            .channel-item{padding:8px 10px;gap:10px}
            .channel-logo{width:36px;height:36px;font-size:16px}
            .channel-name{font-size:13px}
            .channel-group{font-size:10px}
            .channel-num{font-size:10px;padding:2px 6px}
            .channel-count{padding:6px 12px;font-size:11px}

            #channelInfoBar{padding:20px 14px 16px 14px;bottom:0}
            .info-bar-content{flex-direction:column;align-items:flex-start;gap:6px}
            .info-bar-left{gap:10px;width:100%}
            .info-bar-number{font-size:22px}
            .info-bar-name{font-size:16px}
            .info-bar-group{font-size:11px}
            .info-bar-right{width:100%;justify-content:flex-start;gap:8px}
            .info-bar-resolution{font-size:11px;padding:3px 10px}
            .info-bar-live{font-size:10px;padding:3px 8px}

            #playerControls{padding:12px 16px;flex-wrap:wrap;gap:8px}
            .controls-left{gap:8px}
            .controls-right{gap:8px}
            .ctrl-btn{width:36px;height:36px;font-size:15px}
            .volume-slider{width:60px}
            .now-playing-text{font-size:12px}
            .now-playing-res{font-size:10px}
            .welcome-icon{font-size:50px;margin-bottom:14px}
            .welcome-title{font-size:20px}
            .welcome-subtitle{font-size:13px;padding:0 20px;text-align:center}
            .welcome-keys{gap:10px;margin-top:20px}
            .key-hint{font-size:11px}
            .key-badge{padding:3px 8px;font-size:10px}
            #numberOverlay{top:15px;right:15px;padding:12px 18px}
            .number-display{font-size:36px}
            #toast{top:15px;right:15px;left:15px;max-width:none;padding:10px 16px}
            .toast-content{font-size:13px}
        }
        @media(max-width:480px){
            .sidebar-header{padding:10px 12px;min-height:50px}
            .sidebar-header .logo{font-size:16px}
            .sidebar-header .logo span{font-size:20px}
            .channel-logo{width:32px;height:32px;font-size:14px;border-radius:8px}
            .channel-item{padding:7px 8px;gap:8px;border-radius:10px}
            .channel-name{font-size:12px}
            .channel-num{font-size:9px;padding:1px 5px}
            .cat-btn{padding:4px 8px;font-size:10px}
            .cat-count{font-size:9px;padding:1px 4px}
            .ctrl-btn{width:32px;height:32px;font-size:13px}
            .volume-slider{width:50px}
            #channelInfoBar{padding:16px 10px 14px 10px}
            .info-bar-number{font-size:18px}
            .info-bar-name{font-size:14px}
            .info-bar-left{gap:8px}
            .info-bar-resolution{font-size:10px;padding:2px 8px}
            .info-bar-resolution .res-dot{width:6px;height:6px}
            .info-bar-live{font-size:9px;padding:2px 6px}
            .info-bar-live .live-dot{width:6px;height:6px}
        }
        @media(max-height:500px)and(orientation:landscape){
            #sidebar{width:300px}
            .sidebar-header{min-height:44px;padding:8px 12px}
            .channel-item{padding:6px 10px}
            .channel-logo{width:32px;height:32px}
            .categories-wrapper{padding:6px 12px}
            .cat-btn{padding:3px 8px;font-size:10px}
            .channel-count{padding:4px 12px;font-size:10px}
            #channelInfoBar{padding:15px 16px 10px 16px}
            .info-bar-name{font-size:16px}
            .info-bar-number{font-size:22px}
        }
        @media(pointer:coarse){
            .channel-item{min-height:54px}
            .cat-btn{min-height:32px}
            .ctrl-btn{min-width:44px;min-height:44px}
            .icon-btn{min-width:40px;min-height:40px}
        }

        /* iOS safe area */
        @supports(padding-bottom:env(safe-area-inset-bottom)){
            #channelInfoBar{padding-bottom:calc(16px + env(safe-area-inset-bottom))}
            #playerControls{padding-bottom:calc(20px + env(safe-area-inset-bottom))}
        }
    </style>
</head>
<body>
<div id="loadingScreen">
    <div class="loader-overlay">
        <div class="loader-logo">📺</div>
        <div class="loader-text">TiViM Player</div>
        <div class="loader-bar"><div class="loader-bar-inner"></div></div>
    </div>
</div>
<div id="toast"><div class="toast-content" id="toastContent"></div></div>
<button id="mobileMenuBtn" onclick="toggleSidebar()">☰</button>
<div id="app">
    <div id="sidebar">
        <div class="sidebar-header">
            <div class="logo"><span>📺</span> TiViM</div>
            <div class="header-actions"><button class="icon-btn" onclick="toggleSidebar()" title="Kapat">✕</button></div>
        </div>
        <div class="categories-wrapper">
            <div class="categories-nav-hint"><span class="hint-key">▲▼</span> Kanal <span class="hint-key">◄</span> Kategoriye geç <span class="hint-key">OK</span> Seç</div>
            <div class="categories" id="categories"></div>
        </div>
        <div id="focusModeIndicator">📂 KATEGORİ — ◄ ► değiştir, OK seç, ▼ geri dön</div>
        <div class="channel-list-wrapper">
            <div class="channel-count" id="channelCount">0 kanal</div>
            <div class="channel-list" id="channelList"></div>
        </div>
    </div>
    <div id="playerArea">
        <div id="videoContainer">
            <!-- Arka plan resmi: video açılana kadar görünür -->
            <img id="videoBgImage" src="https://raw.githubusercontent.com/kadirsener1/tivim/refs/heads/main/bg.jpg" alt="">
            <video id="videoPlayer" playsinline></video>
            <div id="welcomeScreen">
                <div class="welcome-icon">📺</div>
                <div class="welcome-title">TiViM Player</div>
                <div class="welcome-subtitle">Bir kanal seçerek izlemeye başlayın</div>
                <div class="welcome-keys">
                    <div class="key-hint"><span class="key-badge">◄</span> Kanal listesi</div>
                    <div class="key-hint"><span class="key-badge">►</span> Kapat</div>
                    <div class="key-hint"><span class="key-badge">▲</span> Sonraki kanal</div>
                    <div class="key-hint"><span class="key-badge">▼</span> Önceki kanal</div>
                    <div class="key-hint"><span class="key-badge">OK</span> Oynat</div>
                    <div class="key-hint"><span class="key-badge">0-9</span> Kanal no</div>
                </div>
            </div>
            <div id="bufferingSpinner"><div class="spinner"></div></div>
            <div id="channelInfoBar">
                <div class="info-bar-content">
                    <div class="info-bar-left">
                        <div class="info-bar-number" id="infoBarNumber"></div>
                        <div class="info-bar-details">
                            <div class="info-bar-name" id="infoBarName"></div>
                            <div class="info-bar-group" id="infoBarGroup"></div>
                        </div>
                    </div>
                    <div class="info-bar-right">
                        <div class="info-bar-resolution" id="infoBarRes" style="display:none"><div class="res-dot"></div><span id="infoBarResText"></span></div>
                        <div class="info-bar-live"><div class="live-dot"></div>CANLI</div>
                    </div>
                </div>
            </div>
            <div id="numberOverlay"><div class="number-display" id="numberDisplay"></div><div class="number-hint">Kanal numarası</div></div>
            <div id="playerControls">
                <div class="controls-left">
                    <button class="ctrl-btn" onclick="playPrevChannel()">⏮</button>
                    <button class="ctrl-btn" id="playPauseBtn" onclick="togglePlayPause()">⏸</button>
                    <button class="ctrl-btn" onclick="playNextChannel()">⏭</button>
                    <button class="ctrl-btn" id="muteBtn" onclick="toggleMute()">🔊</button>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100" oninput="setVolume(this.value)">
                </div>
                <div class="now-playing-info">
                    <div class="now-playing-dot"></div>
                    <div class="now-playing-text" id="nowPlayingText">Kanal seçin</div>
                    <div class="now-playing-res" id="nowPlayingRes"></div>
                </div>
                <div class="controls-right">
                    <button class="ctrl-btn" onclick="toggleSidebar()">📋</button>
                    <button class="ctrl-btn" onclick="toggleFullscreen()">⛶</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<script>
const M3U_URL='https://raw.githubusercontent.com/kadirsener1/tivim/refs/heads/main/merged.m3u';

// ============================
// ARKA PLAN RESMİ AYARI
// Bu URL'yi kendi resminizle değiştirin:
const BG_IMAGE_URL='https://raw.githubusercontent.com/kadirsener1/tivim/refs/heads/main/bg.jpg';
// ============================

const AUTO_REFRESH=30*60*1000;
let channels=[],filteredChannels=[],categories=[],allCategoryNames=[];
let currentCategory='all',currentChannelIndex=-1,focusedChannelIndex=0;
let sidebarVisible=true,sidebarOverlayMode=false,isPlaying=false;
let hlsInstance=null,controlsTimeout=null,overlayTimeout=null;
let numberBuffer='',numberTimeout=null;
let sidebarFocusMode='channels',focusedCategoryIndex=0;
let currentResolution='',stallChecker=null,resolutionChecker=null;
let currentPlayingUrl='';

document.addEventListener('DOMContentLoaded',async()=>{
    // Arka plan resimlerini ayarla
    const bgImg=document.getElementById('videoBgImage');
    if(bgImg)bgImg.src=BG_IMAGE_URL;

    await loadM3U(M3U_URL);
    sidebarVisible=true;document.getElementById('sidebar').classList.remove('hidden');
    setTimeout(()=>document.getElementById('loadingScreen').classList.add('hide'),2000);
    setupEventListeners();setupMouseEvents();setupTouchGestures();
    setInterval(async()=>{const pi=currentChannelIndex;await loadM3U(M3U_URL);if(pi>=0&&pi<channels.length)currentChannelIndex=pi;},AUTO_REFRESH);
});

async function loadM3U(url){
    try{const r=await fetch(url);if(!r.ok)throw 0;channels=parseM3U(await r.text());}
    catch(e){try{const r=await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(url));channels=parseM3U(await r.text());}catch(e2){channels=[];showToast('❌','M3U yüklenemedi');return;}}
    channels.forEach((c,i)=>{c.index=i;c.number=i+1;});
    extractCategories();filterChannels();forceRebuildList();
    showToast('✅',`${channels.length} kanal yüklendi`);
}

function parseM3U(t){
    const lines=t.split('\n'),p=[];let c=null;
    for(let i=0;i<lines.length;i++){const l=lines[i].trim();
        if(l.startsWith('#EXTINF:')){c={};const nm=l.match(/tvg-name="([^"]*)"/),lg=l.match(/tvg-logo="([^"]*)"/),gr=l.match(/group-title="([^"]*)"/),tl=l.match(/,(.+)$/);c.name=nm?nm[1]:(tl?tl[1].trim():'Bilinmeyen');c.logo=lg?lg[1]:'';c.group=gr?gr[1]:'Diğer';if(!c.name&&tl)c.name=tl[1].trim();}
        else if(l&&!l.startsWith('#')&&c){c.url=l;if(c.name&&c.url)p.push(c);c=null;}}
    return p;
}
function extractCategories(){const s=new Set();channels.forEach(c=>{if(c.group)s.add(c.group);});categories=Array.from(s).sort((a,b)=>a.localeCompare(b,'tr'));allCategoryNames=['all',...categories];renderCategories();}
function renderCategories(){
    const c=document.getElementById('categories'),isCM=sidebarFocusMode==='categories'&&sidebarVisible;
    let h=`<button class="cat-btn ${currentCategory==='all'?'active':''} ${isCM&&focusedCategoryIndex===0?'cat-focused':''}" onclick="selectCategory('all')">Tümü <span class="cat-count">${channels.length}</span></button>`;
    categories.forEach((cat,i)=>{const cnt=channels.filter(c=>c.group===cat).length,ci=i+1;h+=`<button class="cat-btn ${currentCategory===cat?'active':''} ${isCM&&focusedCategoryIndex===ci?'cat-focused':''}" onclick="selectCategory('${cat.replace(/'/g,"\\'")}')">${cat} <span class="cat-count">${cnt}</span></button>`;});
    c.innerHTML=h;if(isCM){const f=c.querySelector('.cat-focused');if(f)f.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});}
}
function selectCategory(cat){currentCategory=cat;focusedCategoryIndex=allCategoryNames.indexOf(cat);if(focusedCategoryIndex===-1)focusedCategoryIndex=0;renderCategories();filterChannels();focusedChannelIndex=0;forceRebuildList();}
function filterChannels(){filteredChannels=channels.filter(c=>currentCategory==='all'||c.group===currentCategory);document.getElementById('channelCount').textContent=`${filteredChannels.length} kanal`;}
function getListHash(){return currentCategory+'|'+filteredChannels.length+'|'+currentChannelIndex;}
function forceRebuildList(){document.getElementById('channelList').dataset.listHash='';renderChannelList();}
function renderChannelList(){
    const container=document.getElementById('channelList');
    if(!filteredChannels.length){container.innerHTML=`<div style="text-align:center;padding:40px;color:var(--text-dim)"><div style="font-size:40px;margin-bottom:12px">📭</div><div>Kanal bulunamadı</div></div>`;container.dataset.listHash=getListHash();return;}
    const hash=getListHash();
    if(container.dataset.listHash!==hash){const isCM=sidebarFocusMode==='channels';let h='';
        filteredChannels.forEach((ch,i)=>{const isA=currentChannelIndex===ch.index,isF=focusedChannelIndex===i&&sidebarVisible&&isCM;const logo=ch.logo?`<img src="${ch.logo}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='📺'">`:'📺';
            h+=`<div class="channel-item${isA?' active':''}${isF?' focused':''}" data-idx="${i}" onclick="playChannel(${i})" id="ch-${i}"><div class="channel-num">${ch.number}</div><div class="channel-logo">${logo}</div><div class="channel-info"><div class="channel-name">${ch.name}</div><div class="channel-group">${ch.group||''}</div></div></div>`;});
        container.innerHTML=h;container.dataset.listHash=hash;}else updateFocusUI();
}
function updateFocusUI(){
    const container=document.getElementById('channelList'),items=container.children,isCM=sidebarFocusMode==='channels';
    for(let i=0;i<items.length;i++){const el=items[i];if(!el.dataset||el.dataset.idx===undefined)continue;const idx=parseInt(el.dataset.idx),ch=filteredChannels[idx];if(!ch)continue;
        const wA=currentChannelIndex===ch.index,wF=idx===focusedChannelIndex&&sidebarVisible&&isCM;
        if(el.classList.contains('active')!==wA)el.classList.toggle('active',wA);if(el.classList.contains('focused')!==wF)el.classList.toggle('focused',wF);}
    if(isCM&&sidebarVisible){const fe=document.getElementById(`ch-${focusedChannelIndex}`);if(fe){const lE=container,eT=fe.offsetTop-lE.offsetTop,eH=fe.offsetHeight,lH=lE.clientHeight,sT=lE.scrollTop;if(eT<sT)lE.scrollTop=eT;else if(eT+eH>sT+lH)lE.scrollTop=eT+eH-lH;}}
}
function getResLabel(w,h){if(h>=2160||w>=3840)return'4K UHD';if(h>=1440||w>=2560)return'1440p QHD';if(h>=1080||w>=1920)return'1080p FHD';if(h>=720||w>=1280)return'720p HD';if(h>=576)return'576p SD';if(h>=480)return'480p SD';if(h>=360)return'360p';if(h>0)return h+'p';return'';}
function updateResDisplay(txt){currentResolution=txt;const el=document.getElementById('infoBarRes'),et=document.getElementById('infoBarResText');if(txt){et.textContent=txt;el.style.display='flex';}else{el.style.display='none';}document.getElementById('nowPlayingRes').textContent=txt?`• ${txt}`:'';}
function startResMonitor(){if(resolutionChecker)clearInterval(resolutionChecker);const v=document.getElementById('videoPlayer');currentResolution='';updateResDisplay('');resolutionChecker=setInterval(()=>{if(v.videoWidth>0&&v.videoHeight>0){const w=v.videoWidth,h=v.videoHeight,l=getResLabel(w,h),nr=`${w}×${h} ${l}`;if(nr!==currentResolution)updateResDisplay(nr);}},2000);}

function playChannel(fi){
    const ch=filteredChannels[fi];if(!ch)return;

    if(ch.url===currentPlayingUrl){
        hideSidebar();
        showChannelInfoBar(ch);
        return;
    }

    currentChannelIndex=ch.index;focusedChannelIndex=fi;currentPlayingUrl=ch.url;
    const video=document.getElementById('videoPlayer'),url=ch.url;
    if(hlsInstance){hlsInstance.destroy();hlsInstance=null;}if(stallChecker){clearInterval(stallChecker);stallChecker=null;}if(resolutionChecker){clearInterval(resolutionChecker);resolutionChecker=null;}
    video.removeAttribute('src');video.load();updateResDisplay('');
    document.getElementById('welcomeScreen').style.display='none';
    document.getElementById('bufferingSpinner').style.display='block';

    // Arka plan resmini henüz gizleme - video oynamaya başlayınca gizlenecek
    const bgImg=document.getElementById('videoBgImage');

    const isHLS=/\.m3u8/i.test(url)||/m3u8/i.test(url);

    if(isHLS&&Hls.isSupported()){
        hlsInstance=new Hls({
            // === 50 FPS AKICI YAYIN AYARLARI ===
            maxBufferLength: 30,
            maxMaxBufferLength: 60,
            maxBufferSize: 60 * 1000 * 1000,
            maxBufferHole: 0.3,
            backBufferLength: 15,

            manifestLoadingTimeOut: 15000,
            manifestLoadingMaxRetry: 4,
            manifestLoadingRetryDelay: 500,
            levelLoadingTimeOut: 15000,
            levelLoadingMaxRetry: 4,
            fragLoadingTimeOut: 25000,
            fragLoadingMaxRetry: 5,
            fragLoadingRetryDelay: 500,

            enableWorker: true,
            lowLatencyMode: false,
            startFragPrefetch: true,
            progressive: true,
            testBandwidth: true,

            // ABR — kalite geçişi yumuşak, yüksek kalite tercih
            abrEwmaDefaultEstimate: 3000000,
            abrBandWidthFactor: 0.9,
            abrBandWidthUpFactor: 0.7,
            abrMaxWithRealBitrate: true,

            liveSyncDurationCount: 3,
            liveMaxLatencyDurationCount: 8,
            liveDurationInfinity: true,

            nudgeOffset: 0.05,
            nudgeMaxRetry: 10,
            startPosition: -1,

            stretchShortVideoTrack: true,
            forceKeyFrameOnDiscontinuity: true,
            appendErrorMaxRetry: 5,

            capLevelToPlayerSize: false,

            // FPS ile ilgili: highBufferWatchdogPeriod düşük tutarak akıcılık
            highBufferWatchdogPeriod: 1,
        });
        hlsInstance.loadSource(url);hlsInstance.attachMedia(video);
        hlsInstance.on(Hls.Events.MANIFEST_PARSED,()=>{video.play().catch(()=>{});});
        hlsInstance.on(Hls.Events.FRAG_BUFFERED,()=>{document.getElementById('bufferingSpinner').style.display='none';});
        hlsInstance.on(Hls.Events.ERROR,(e,d)=>{if(d.fatal){if(d.type===Hls.ErrorTypes.NETWORK_ERROR){showToast('🔄','Bağlantı sorunu...');setTimeout(()=>{if(hlsInstance)hlsInstance.startLoad();},1500);}else if(d.type===Hls.ErrorTypes.MEDIA_ERROR){hlsInstance.recoverMediaError();}else{showToast('❌','Kanal yüklenemedi');document.getElementById('bufferingSpinner').style.display='none';}}if(d.details==='bufferStalledError'&&video.currentTime>0)video.currentTime+=0.1;});
    }else if(video.canPlayType('application/vnd.apple.mpegurl')&&isHLS){video.src=url;video.play().catch(()=>{});}
    else{video.src=url;video.play().catch(()=>{});}

    video.onplaying=()=>{
        document.getElementById('bufferingSpinner').style.display='none';
        isPlaying=true;
        document.getElementById('playPauseBtn').textContent='⏸';
        // Video oynamaya başladığında arka plan resmini gizle
        if(bgImg)bgImg.classList.add('hide');
    };
    video.onwaiting=()=>{document.getElementById('bufferingSpinner').style.display='block';};
    video.oncanplaythrough=()=>{document.getElementById('bufferingSpinner').style.display='none';};
    video.onerror=()=>{document.getElementById('bufferingSpinner').style.display='none';currentPlayingUrl='';if(stallChecker){clearInterval(stallChecker);stallChecker=null;}if(resolutionChecker){clearInterval(resolutionChecker);resolutionChecker=null;}showToast('❌','Bu kanal oynatılamıyor');
        // Hata olursa arka planı tekrar göster
        if(bgImg)bgImg.classList.remove('hide');
    };

    let lastT=-1,sc=0;
    stallChecker=setInterval(()=>{if(video.paused||video.ended||!isPlaying)return;if(video.currentTime===lastT&&video.readyState>=2){sc++;if(sc>=2){const b=video.buffered;if(b.length>0&&b.end(b.length-1)>video.currentTime+0.5)video.currentTime+=0.1;sc=0;}}else sc=0;lastT=video.currentTime;},3000);

    startResMonitor();document.getElementById('nowPlayingText').textContent=ch.name;
    showChannelInfoBar(ch);forceRebuildList();
    if(window.innerWidth<=768||sidebarOverlayMode){setTimeout(()=>hideSidebar(),600);}
    else{setTimeout(()=>{sidebarOverlayMode=true;hideSidebar();},800);}
    showToast('▶️',ch.name);
}

function showChannelInfoBar(ch){
    document.getElementById('infoBarNumber').textContent=ch.number;
    document.getElementById('infoBarName').textContent=ch.name;
    document.getElementById('infoBarGroup').textContent=ch.group||'';
    const bar=document.getElementById('channelInfoBar');bar.style.display='block';
    clearTimeout(overlayTimeout);overlayTimeout=setTimeout(()=>{bar.style.display='none';},5000);
}

function playNextChannel(){if(!filteredChannels.length)return;focusedChannelIndex=(focusedChannelIndex+1)%filteredChannels.length;playChannel(focusedChannelIndex);}
function playPrevChannel(){if(!filteredChannels.length)return;focusedChannelIndex=focusedChannelIndex<=0?filteredChannels.length-1:focusedChannelIndex-1;playChannel(focusedChannelIndex);}

function togglePlayPause(){const v=document.getElementById('videoPlayer');if(v.paused){v.play();isPlaying=true;document.getElementById('playPauseBtn').textContent='⏸';}else{v.pause();isPlaying=false;document.getElementById('playPauseBtn').textContent='▶️';}}
function toggleMute(){const v=document.getElementById('videoPlayer');v.muted=!v.muted;document.getElementById('muteBtn').textContent=v.muted?'🔇':'🔊';document.getElementById('volumeSlider').value=v.muted?0:v.volume*100;}
function setVolume(val){const v=document.getElementById('videoPlayer');v.volume=val/100;v.muted=val==0;document.getElementById('muteBtn').textContent=val==0?'🔇':(val<50?'🔉':'🔊');}

function toggleFullscreen(){
    const el=document.documentElement;
    if(!document.fullscreenElement&&!document.webkitFullscreenElement&&!document.mozFullScreenElement&&!document.msFullscreenElement){
        // Tam ekran aç
        if(el.requestFullscreen){
            el.requestFullscreen().catch(()=>{
                // Fallback: video elementini tam ekrana al
                tryVideoFullscreen();
            });
        }else if(el.webkitRequestFullscreen){
            el.webkitRequestFullscreen();
        }else if(el.mozRequestFullScreen){
            el.mozRequestFullScreen();
        }else if(el.msRequestFullscreen){
            el.msRequestFullscreen();
        }else{
            // Son çare: video elementini dene
            tryVideoFullscreen();
        }
    }else{
        // Tam ekrandan çık
        if(document.exitFullscreen){
            document.exitFullscreen().catch(()=>{});
        }else if(document.webkitExitFullscreen){
            document.webkitExitFullscreen();
        }else if(document.mozCancelFullScreen){
            document.mozCancelFullScreen();
        }else if(document.msExitFullscreen){
            document.msExitFullscreen();
        }
    }
}

function tryVideoFullscreen(){
    const video=document.getElementById('videoPlayer');
    if(video.webkitEnterFullscreen){
        // iOS Safari için video tam ekran
        video.webkitEnterFullscreen();
    }else if(video.requestFullscreen){
        video.requestFullscreen().catch(()=>{});
    }else if(video.webkitRequestFullscreen){
        video.webkitRequestFullscreen();
    }
}

function toggleSidebar(){sidebarVisible?hideSidebar():showSidebar();}
function showSidebar(){const s=document.getElementById('sidebar');s.classList.remove('hidden');if(sidebarOverlayMode)s.classList.add('overlay-mode');sidebarVisible=true;sidebarFocusMode='channels';updateFocusModeIndicator();forceRebuildList();renderCategories();}
function hideSidebar(){document.getElementById('sidebar').classList.add('hidden');sidebarVisible=false;sidebarFocusMode='channels';updateFocusModeIndicator();}
function updateFocusModeIndicator(){document.getElementById('focusModeIndicator').classList.toggle('show',sidebarVisible&&sidebarFocusMode==='categories');}

function setupMouseEvents(){const p=document.getElementById('playerArea');p.addEventListener('mousemove',showControls);p.addEventListener('click',(e)=>{if(e.target===document.getElementById('videoPlayer')||e.target===document.getElementById('videoContainer'))showControls();});p.addEventListener('touchstart',showControls,{passive:true});}
function showControls(){const c=document.getElementById('playerControls');c.classList.add('visible');clearTimeout(controlsTimeout);controlsTimeout=setTimeout(()=>c.classList.remove('visible'),4000);}
function setupTouchGestures(){
    let sx=0,sy=0,st=0;const pl=document.getElementById('playerArea');
    pl.addEventListener('touchstart',(e)=>{if(e.target.closest('#playerControls')||e.target.closest('#channelInfoBar'))return;sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();},{passive:true});
    pl.addEventListener('touchend',(e)=>{if(e.target.closest('#playerControls')||e.target.closest('#channelInfoBar'))return;const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Date.now()-st<500&&Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)){if(dx>0&&!sidebarVisible){sidebarOverlayMode=true;showSidebar();}else if(dx<0&&sidebarVisible)hideSidebar();}},{passive:true});
    const sb=document.getElementById('sidebar');let sbx=0;
    sb.addEventListener('touchstart',(e)=>{sbx=e.touches[0].clientX;},{passive:true});
    sb.addEventListener('touchend',(e)=>{if(e.changedTouches[0].clientX-sbx<-60)hideSidebar();},{passive:true});
}
function setupEventListeners(){document.addEventListener('keydown',handleKeydown);}

function handleKeydown(e){
    const ae=document.activeElement;if(ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.tagName==='SELECT')){if(e.key==='Escape'){ae.blur();e.preventDefault();}return;}
    switch(e.key){
        case'ArrowLeft':e.preventDefault();
            if(sidebarVisible){if(sidebarFocusMode==='channels'){sidebarFocusMode='categories';focusedCategoryIndex=allCategoryNames.indexOf(currentCategory);if(focusedCategoryIndex<0)focusedCategoryIndex=0;updateFocusModeIndicator();renderCategories();updateFocusUI();}else{if(focusedCategoryIndex>0){focusedCategoryIndex--;renderCategories();}}}
            else{sidebarOverlayMode=true;showSidebar();}break;
        case'ArrowRight':e.preventDefault();
            if(sidebarVisible){if(sidebarFocusMode==='categories'){if(focusedCategoryIndex<allCategoryNames.length-1){focusedCategoryIndex++;renderCategories();}}else hideSidebar();}break;

        case'ArrowUp':e.preventDefault();
            if(sidebarVisible){
                if(sidebarFocusMode==='channels'&&focusedChannelIndex>0){focusedChannelIndex--;updateFocusUI();}
            }else{
                if(currentChannelIndex>=0)playNextChannel();else{sidebarOverlayMode=true;showSidebar();}
            }break;

        case'ArrowDown':e.preventDefault();
            if(sidebarVisible){
                if(sidebarFocusMode==='channels'){if(focusedChannelIndex<filteredChannels.length-1){focusedChannelIndex++;updateFocusUI();}}
                else{const cn=allCategoryNames[focusedCategoryIndex];if(cn!==currentCategory)selectCategory(cn);sidebarFocusMode='channels';focusedChannelIndex=0;updateFocusModeIndicator();renderCategories();forceRebuildList();}
            }else{
                if(currentChannelIndex>=0)playPrevChannel();else{sidebarOverlayMode=true;showSidebar();}
            }break;

        case'Enter':e.preventDefault();
            if(sidebarVisible){if(sidebarFocusMode==='categories'){const cn=allCategoryNames[focusedCategoryIndex];selectCategory(cn);sidebarFocusMode='channels';focusedChannelIndex=0;updateFocusModeIndicator();renderCategories();forceRebuildList();showToast('📂',cn==='all'?'Tümü':cn);}else if(filteredChannels.length>0)playChannel(focusedChannelIndex);}
            else{sidebarOverlayMode=true;showSidebar();}break;
        case'Escape':case'Backspace':e.preventDefault();
            if(sidebarVisible){if(sidebarFocusMode==='categories'){sidebarFocusMode='channels';updateFocusModeIndicator();renderCategories();updateFocusUI();}else hideSidebar();}break;
        case' ':e.preventDefault();togglePlayPause();break;
        case'm':case'M':e.preventDefault();toggleMute();break;
        case'f':case'F':e.preventDefault();toggleFullscreen();break;
        case's':case'S':e.preventDefault();toggleSidebar();break;
        case'Tab':e.preventDefault();if(sidebarVisible){if(sidebarFocusMode==='channels'){sidebarFocusMode='categories';focusedCategoryIndex=allCategoryNames.indexOf(currentCategory);if(focusedCategoryIndex<0)focusedCategoryIndex=0;}else sidebarFocusMode='channels';updateFocusModeIndicator();renderCategories();updateFocusUI();}break;
        case'+':case'=':e.preventDefault();adjustVolume(5);break;
        case'-':case'_':e.preventDefault();adjustVolume(-5);break;
        case'PageUp':e.preventDefault();playNextChannel();break;
        case'PageDown':e.preventDefault();playPrevChannel();break;
        default:if(e.key>='0'&&e.key<='9'){e.preventDefault();handleNumberInput(e.key);}break;
    }
}

function adjustVolume(d){const v=document.getElementById('videoPlayer');let n=Math.max(0,Math.min(1,v.volume+d/100));v.volume=n;v.muted=n===0;document.getElementById('volumeSlider').value=n*100;document.getElementById('muteBtn').textContent=n===0?'🔇':(n<.5?'🔉':'🔊');showToast('🔊',`Ses: %${Math.round(n*100)}`);}
function handleNumberInput(d){numberBuffer+=d;document.getElementById('numberDisplay').textContent=numberBuffer;document.getElementById('numberOverlay').style.display='block';clearTimeout(numberTimeout);numberTimeout=setTimeout(()=>{const n=parseInt(numberBuffer);numberBuffer='';document.getElementById('numberOverlay').style.display='none';const i=filteredChannels.findIndex(c=>c.number===n);if(i!==-1){focusedChannelIndex=i;playChannel(i);}else showToast('⚠️',`${n} numaralı kanal bulunamadı`);},1500);}
function showToast(i,m){const t=document.getElementById('toast');document.getElementById('toastContent').innerHTML=`<span>${i}</span> ${m}`;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>{t.style.display='none';},3000);}
</script>
