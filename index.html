<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>📺 TiViM - IPTV Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6c5ce7;
            --primary-dark: #5a4bd1;
            --bg-dark: #0a0a1a;
            --bg-card: #141428;
            --bg-sidebar: rgba(10, 10, 26, 0.95);
            --bg-sidebar-transparent: rgba(10, 10, 26, 0.75);
            --text: #e0e0e0;
            --text-dim: #8888aa;
            --accent: #00cec9;
            --danger: #ff6b6b;
            --success: #00b894;
            --border: rgba(108, 92, 231, 0.3);
            --glow: rgba(108, 92, 231, 0.5);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #loadingScreen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s;
        }
        #loadingScreen.hide { opacity: 0; pointer-events: none; }

        .loader-logo { font-size: 64px; margin-bottom: 20px; animation: pulse 1.5s infinite; }
        .loader-text { font-size: 24px; color: var(--primary); margin-bottom: 30px; font-weight: 700; }
        .loader-bar { width: 200px; height: 4px; background: var(--bg-card); border-radius: 2px; overflow: hidden; }
        .loader-bar-inner { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 2px; animation: loadProgress 2s ease-in-out forwards; }

        @keyframes loadProgress { 0%{width:0%} 50%{width:70%} 100%{width:100%} }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

        #app { display: flex; height: 100vh; width: 100vw; position: relative; }

        #sidebar {
            position: fixed; left: 0; top: 0;
            width: 380px; height: 100vh;
            background: var(--bg-sidebar);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex; flex-direction: column;
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s;
            border-right: 1px solid var(--border);
            box-shadow: 5px 0 30px rgba(0,0,0,0.5);
        }
        #sidebar.hidden { transform: translateX(-100%); opacity: 0; }
        #sidebar.overlay-mode { background: var(--bg-sidebar-transparent); }

        .sidebar-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            min-height: 65px;
            background: rgba(108, 92, 231, 0.1);
            flex-shrink: 0;
        }
        .sidebar-header .logo {
            display: flex; align-items: center; gap: 10px;
            font-size: 22px; font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .sidebar-header .logo span { font-size: 28px; }
        .header-actions { display: flex; gap: 8px; }

        .icon-btn {
            width: 36px; height: 36px;
            border: 1px solid var(--border);
            background: rgba(108,92,231,0.15);
            color: var(--text); border-radius: 10px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 16px; transition: all 0.2s;
        }
        .icon-btn:hover,.icon-btn:focus { background: var(--primary); color: white; border-color: var(--primary); transform: scale(1.05); outline: none; }

        .categories-wrapper { padding: 10px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .categories-nav-hint {
            font-size: 10px; color: var(--text-dim); margin-bottom: 6px;
            display: flex; align-items: center; gap: 6px;
        }
        .categories-nav-hint .hint-key {
            background: rgba(108,92,231,0.2); padding: 1px 6px; border-radius: 4px;
            font-size: 9px; color: var(--primary); font-weight: 700;
        }
        .categories { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 6px; scrollbar-width: none; }
        .categories::-webkit-scrollbar { display: none; }

        .cat-btn {
            padding: 6px 14px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); border-radius: 20px;
            color: var(--text-dim); font-size: 12px; cursor: pointer;
            white-space: nowrap; transition: all 0.15s; flex-shrink: 0;
        }
        .cat-btn:hover,.cat-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .cat-btn.active { box-shadow: 0 0 15px var(--glow); }
        .cat-btn.cat-focused { outline: 2px solid var(--accent); outline-offset: 2px; box-shadow: 0 0 12px rgba(0,206,201,0.4); }
        .cat-count { background: rgba(255,255,255,0.2); padding: 1px 6px; border-radius: 10px; font-size: 10px; margin-left: 4px; }

        .channel-list-wrapper { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        .channel-count {
            padding: 8px 20px; font-size: 12px; color: var(--text-dim);
            border-bottom: 1px solid rgba(255,255,255,0.03); flex-shrink: 0;
        }
        .channel-list { flex: 1; overflow-y: auto; padding: 6px 10px; }
        .channel-list::-webkit-scrollbar { width: 4px; }
        .channel-list::-webkit-scrollbar-track { background: transparent; }
        .channel-list::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 2px; }

        .channel-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 14px; border-radius: 12px; cursor: pointer;
            transition: background 0.1s, border-color 0.1s;
            border: 1px solid transparent; margin-bottom: 2px;
        }
        .channel-item:hover { background: rgba(108,92,231,0.15); border-color: var(--border); }
        .channel-item.active {
            background: linear-gradient(135deg, rgba(108,92,231,0.3), rgba(0,206,201,0.15));
            border-color: var(--primary); box-shadow: 0 0 20px rgba(108,92,231,0.2);
        }
        .channel-item.focused {
            background: rgba(0,206,201,0.12); border-color: var(--accent);
            box-shadow: 0 0 12px rgba(0,206,201,0.25);
        }
        .channel-item.active.focused {
            background: linear-gradient(135deg, rgba(108,92,231,0.35), rgba(0,206,201,0.2));
            border-color: var(--accent);
        }

        .channel-logo {
            width: 44px; height: 44px; border-radius: 10px;
            background: rgba(255,255,255,0.08); display: flex;
            align-items: center; justify-content: center;
            overflow: hidden; flex-shrink: 0; font-size: 20px;
        }
        .channel-logo img { width: 100%; height: 100%; object-fit: contain; }
        .channel-info { flex: 1; min-width: 0; }
        .channel-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .channel-group { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
        .channel-num {
            font-size: 11px; color: var(--text-dim); background: rgba(255,255,255,0.05);
            padding: 2px 8px; border-radius: 6px; font-weight: 600;
        }

        #playerArea {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #000; position: relative; width: 100%; height: 100vh;
        }
        #videoContainer { width: 100%; height: 100%; position: relative; background: #000; }
        #videoPlayer { width: 100%; height: 100%; background: #000; object-fit: contain; }

        #welcomeScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(ellipse at center, rgba(108,92,231,0.1) 0%, var(--bg-dark) 70%);
            z-index: 5;
        }
        .welcome-icon { font-size: 80px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        .welcome-title {
            font-size: 28px; font-weight: 800; margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .welcome-subtitle { color: var(--text-dim); font-size: 16px; }
        .welcome-keys { margin-top: 30px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 650px; padding: 0 20px; }
        .key-hint { display: flex; align-items: center; gap: 8px; color: var(--text-dim); font-size: 13px; }
        .key-badge {
            background: rgba(108,92,231,0.2); border: 1px solid var(--border);
            padding: 4px 10px; border-radius: 6px; font-size: 12px;
            color: var(--primary); font-weight: 600;
        }

        #channelOverlay {
            position: absolute; bottom: 80px; left: 30px;
            background: rgba(10,10,26,0.85); backdrop-filter: blur(15px);
            padding: 16px 24px; border-radius: 16px; border: 1px solid var(--border);
            z-index: 100; display: none; animation: slideUp 0.3s ease; max-width: 450px;
        }
        @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }

        .overlay-channel-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .overlay-channel-group { color: var(--accent); font-size: 13px; }
        .overlay-resolution {
            display: inline-flex; align-items: center; gap: 5px;
            margin-top: 8px; padding: 3px 10px;
            background: rgba(108,92,231,0.2); border: 1px solid var(--border);
            border-radius: 8px; font-size: 12px; color: var(--primary); font-weight: 600;
        }
        .overlay-resolution .res-dot {
            width: 6px; height: 6px; border-radius: 50%; background: var(--success);
        }

        #playerControls {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 20px 30px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            display: flex; align-items: center; justify-content: space-between;
            z-index: 50; opacity: 0; transition: opacity 0.3s;
        }
        #playerControls.visible { opacity: 1; }
        .controls-left,.controls-right { display: flex; align-items: center; gap: 12px; }

        .ctrl-btn {
            width: 42px; height: 42px; border: none;
            background: rgba(255,255,255,0.1); color: white;
            border-radius: 50%; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            font-size: 18px; transition: all 0.2s;
        }
        .ctrl-btn:hover { background: var(--primary); transform: scale(1.1); }

        .volume-slider {
            width: 80px; height: 4px; -webkit-appearance: none; appearance: none;
            background: rgba(255,255,255,0.2); border-radius: 2px; outline: none; cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px;
            background: var(--primary); border-radius: 50%; cursor: pointer;
        }

        .now-playing-info { display: flex; align-items: center; gap: 10px; flex: 1; justify-content: center; }
        .now-playing-dot { width: 8px; height: 8px; background: var(--danger); border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .now-playing-text { font-size: 14px; font-weight: 600; }
        .now-playing-res { font-size: 11px; color: var(--accent); font-weight: 600; margin-left: 4px; }

        #toast {
            position: fixed; bottom: 30px; right: 30px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; padding: 14px 20px; z-index: 9999;
            display: none; animation: slideUp 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); max-width: 300px;
        }
        .toast-content { display: flex; align-items: center; gap: 10px; font-size: 14px; }

        #bufferingSpinner {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%); z-index: 20; display: none;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(108,92,231,0.2); border-top-color: var(--primary);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to{transform:rotate(360deg)} }

        #numberOverlay {
            position: absolute; top: 30px; right: 30px;
            background: rgba(10,10,26,0.9); backdrop-filter: blur(15px);
            padding: 16px 24px; border-radius: 14px; border: 1px solid var(--border);
            z-index: 200; display: none; text-align: center;
        }
        .number-display { font-size: 48px; font-weight: 800; color: var(--primary); font-variant-numeric: tabular-nums; }
        .number-hint { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

        #focusModeIndicator {
            padding: 6px 16px; font-size: 11px; color: var(--accent); font-weight: 600;
            background: rgba(0,206,201,0.1); border-bottom: 1px solid rgba(0,206,201,0.2);
            text-align: center; display: none; flex-shrink: 0; white-space: nowrap;
        }
        #focusModeIndicator.show { display: block; }

        /* Mobile Menu Button */
        #mobileMenuBtn {
            display: none; position: fixed; top: 15px; left: 15px; z-index: 900;
            width: 44px; height: 44px; border-radius: 12px;
            background: rgba(10,10,26,0.9); border: 1px solid var(--border);
            color: var(--text); font-size: 20px; cursor: pointer;
            align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }

        /* ==================== MOBİL UYUM ==================== */
        @media (max-width: 768px) {
            #sidebar {
                width: 100%;
                border-right: none;
            }

            #mobileMenuBtn { display: flex; }

            .sidebar-header {
                padding: 12px 16px;
                min-height: 56px;
            }
            .sidebar-header .logo { font-size: 18px; }
            .sidebar-header .logo span { font-size: 24px; }

            .categories-wrapper { padding: 8px 12px; }
            .categories-nav-hint { display: none; }
            .cat-btn { padding: 5px 10px; font-size: 11px; }

            .channel-list { padding: 4px 6px; }
            .channel-item { padding: 8px 10px; gap: 10px; }
            .channel-logo { width: 36px; height: 36px; font-size: 16px; }
            .channel-name { font-size: 13px; }
            .channel-group { font-size: 10px; }
            .channel-num { font-size: 10px; padding: 2px 6px; }
            .channel-count { padding: 6px 12px; font-size: 11px; }

            #channelOverlay {
                left: 10px; right: 10px; bottom: 70px;
                max-width: none; padding: 12px 16px;
                border-radius: 12px;
            }
            .overlay-channel-name { font-size: 16px; }
            .overlay-channel-group { font-size: 12px; }

            #playerControls {
                padding: 12px 16px;
                flex-wrap: wrap;
                gap: 8px;
            }
            .controls-left { gap: 8px; }
            .controls-right { gap: 8px; }
            .ctrl-btn { width: 36px; height: 36px; font-size: 15px; }
            .volume-slider { width: 60px; }
            .now-playing-text { font-size: 12px; }
            .now-playing-res { font-size: 10px; }

            .welcome-icon { font-size: 50px; margin-bottom: 14px; }
            .welcome-title { font-size: 20px; }
            .welcome-subtitle { font-size: 13px; padding: 0 20px; text-align: center; }
            .welcome-keys { gap: 10px; margin-top: 20px; }
            .key-hint { font-size: 11px; }
            .key-badge { padding: 3px 8px; font-size: 10px; }

            #numberOverlay { top: 15px; right: 15px; padding: 12px 18px; }
            .number-display { font-size: 36px; }

            #toast { bottom: 15px; right: 15px; left: 15px; max-width: none; padding: 10px 16px; }
            .toast-content { font-size: 13px; }
        }

        @media (max-width: 480px) {
            #sidebar { width: 100%; }

            .sidebar-header { padding: 10px 12px; min-height: 50px; }
            .sidebar-header .logo { font-size: 16px; }
            .sidebar-header .logo span { font-size: 20px; }

            .channel-logo { width: 32px; height: 32px; font-size: 14px; border-radius: 8px; }
            .channel-item { padding: 7px 8px; gap: 8px; border-radius: 10px; }
            .channel-name { font-size: 12px; }
            .channel-num { font-size: 9px; padding: 1px 5px; }

            .cat-btn { padding: 4px 8px; font-size: 10px; }
            .cat-count { font-size: 9px; padding: 1px 4px; }

            .ctrl-btn { width: 32px; height: 32px; font-size: 13px; }
            .volume-slider { width: 50px; }

            #channelOverlay { padding: 10px 14px; border-radius: 10px; }
            .overlay-channel-name { font-size: 14px; }
        }

        /* Landscape mobile */
        @media (max-height: 500px) and (orientation: landscape) {
            #sidebar { width: 300px; }
            .sidebar-header { min-height: 44px; padding: 8px 12px; }
            .channel-item { padding: 6px 10px; }
            .channel-logo { width: 32px; height: 32px; }
            .categories-wrapper { padding: 6px 12px; }
            .cat-btn { padding: 3px 8px; font-size: 10px; }
            .channel-count { padding: 4px 12px; font-size: 10px; }
        }

        /* Touch-friendly tap areas */
        @media (pointer: coarse) {
            .channel-item { min-height: 54px; }
            .cat-btn { min-height: 32px; }
            .ctrl-btn { min-width: 44px; min-height: 44px; }
            .icon-btn { min-width: 40px; min-height: 40px; }
        }
    </style>
</head>
<body>

<div id="loadingScreen">
    <div class="loader-logo">📺</div>
    <div class="loader-text">TiViM Player</div>
    <div class="loader-bar"><div class="loader-bar-inner"></div></div>
</div>

<div id="toast"><div class="toast-content" id="toastContent"></div></div>
<button id="mobileMenuBtn" onclick="toggleSidebar()">☰</button>

<div id="app">
    <div id="sidebar">
        <div class="sidebar-header">
            <div class="logo"><span>📺</span> TiViM</div>
            <div class="header-actions">
                <button class="icon-btn" onclick="toggleSidebar()" title="Kapat">✕</button>
            </div>
        </div>
        <div class="categories-wrapper">
            <div class="categories-nav-hint">
                <span class="hint-key">▲▼</span> Kanal
                <span class="hint-key">◄</span> Kategoriye geç
                <span class="hint-key">OK</span> Seç
            </div>
            <div class="categories" id="categories"></div>
        </div>
        <div id="focusModeIndicator">📂 KATEGORİ — ◄ ► değiştir, OK seç, ▼ geri dön</div>
        <div class="channel-list-wrapper">
            <div class="channel-count" id="channelCount">0 kanal</div>
            <div class="channel-list" id="channelList"></div>
        </div>
    </div>

    <div id="playerArea">
        <div id="videoContainer">
            <video id="videoPlayer" playsinline></video>
            <div id="welcomeScreen">
                <div class="welcome-icon">📺</div>
                <div class="welcome-title">TiViM Player</div>
                <div class="welcome-subtitle">Bir kanal seçerek izlemeye başlayın</div>
                <div class="welcome-keys">
                    <div class="key-hint"><span class="key-badge">◄</span> Kanal listesi / Kategori</div>
                    <div class="key-hint"><span class="key-badge">►</span> Kapat</div>
                    <div class="key-hint"><span class="key-badge">▲ ▼</span> Kanal seç</div>
                    <div class="key-hint"><span class="key-badge">OK</span> Oynat</div>
                    <div class="key-hint"><span class="key-badge">0-9</span> Kanal no</div>
                    <div class="key-hint"><span class="key-badge">M</span> Sessiz</div>
                    <div class="key-hint"><span class="key-badge">F</span> Tam Ekran</div>
                </div>
            </div>
            <div id="bufferingSpinner"><div class="spinner"></div></div>
            <div id="channelOverlay">
                <div class="overlay-channel-name" id="overlayName"></div>
                <div class="overlay-channel-group" id="overlayGroup"></div>
                <div class="overlay-resolution" id="overlayResolution" style="display:none;">
                    <div class="res-dot"></div>
                    <span id="overlayResText"></span>
                </div>
            </div>
            <div id="numberOverlay">
                <div class="number-display" id="numberDisplay"></div>
                <div class="number-hint">Kanal numarası</div>
            </div>
            <div id="playerControls">
                <div class="controls-left">
                    <button class="ctrl-btn" onclick="playPrevChannel()">⏮</button>
                    <button class="ctrl-btn" id="playPauseBtn" onclick="togglePlayPause()">⏸</button>
                    <button class="ctrl-btn" onclick="playNextChannel()">⏭</button>
                    <button class="ctrl-btn" id="muteBtn" onclick="toggleMute()">🔊</button>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100" oninput="setVolume(this.value)">
                </div>
                <div class="now-playing-info">
                    <div class="now-playing-dot"></div>
                    <div class="now-playing-text" id="nowPlayingText">Kanal seçin</div>
                    <div class="now-playing-res" id="nowPlayingRes"></div>
                </div>
                <div class="controls-right">
                    <button class="ctrl-btn" onclick="toggleSidebar()" title="Kanal Listesi">📋</button>
                    <button class="ctrl-btn" onclick="toggleFullscreen()" title="Tam Ekran">⛶</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>

<script>
const M3U_URL = 'https://raw.githubusercontent.com/kadirsener1/tivim/refs/heads/main/merged.m3u';

let channels = [];
let filteredChannels = [];
let categories = [];
let allCategoryNames = [];
let currentCategory = 'all';
let currentChannelIndex = -1;
let focusedChannelIndex = 0;
let sidebarVisible = true;
let sidebarOverlayMode = false;
let isPlaying = false;
let hlsInstance = null;
let controlsTimeout = null;
let overlayTimeout = null;
let numberBuffer = '';
let numberTimeout = null;
let sidebarFocusMode = 'channels';
let focusedCategoryIndex = 0;
let currentResolution = '';
let stallChecker = null;
let resolutionChecker = null;

document.addEventListener('DOMContentLoaded', async () => {
    await loadM3U(M3U_URL);
    setTimeout(() => document.getElementById('loadingScreen').classList.add('hide'), 2000);
    setupEventListeners();
    setupMouseEvents();
    setupTouchGestures();
});

async function loadM3U(url) {
    try {
        const r = await fetch(url);
        if (!r.ok) throw new Error();
        channels = parseM3U(await r.text());
    } catch (e) {
        try {
            const r = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(url));
            channels = parseM3U(await r.text());
        } catch (e2) {
            channels = [];
            showToast('❌', 'M3U yüklenemedi');
            return;
        }
    }
    channels.forEach((ch, i) => { ch.index = i; ch.number = i + 1; });
    extractCategories(); filterChannels();
    showToast('✅', `${channels.length} kanal yüklendi`);
}

function parseM3U(text) {
    const lines = text.split('\n');
    const parsed = [];
    let cur = null;
    for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line.startsWith('#EXTINF:')) {
            cur = {};
            const nm = line.match(/tvg-name="([^"]*)"/);
            const lg = line.match(/tvg-logo="([^"]*)"/);
            const gr = line.match(/group-title="([^"]*)"/);
            const tl = line.match(/,(.+)$/);
            cur.name = nm ? nm[1] : (tl ? tl[1].trim() : 'Bilinmeyen');
            cur.logo = lg ? lg[1] : '';
            cur.group = gr ? gr[1] : 'Diğer';
            if (!cur.name && tl) cur.name = tl[1].trim();
        } else if (line && !line.startsWith('#') && cur) {
            cur.url = line;
            if (cur.name && cur.url) parsed.push(cur);
            cur = null;
        }
    }
    return parsed;
}

function extractCategories() {
    const s = new Set();
    channels.forEach(ch => { if (ch.group) s.add(ch.group); });
    categories = Array.from(s).sort((a, b) => a.localeCompare(b, 'tr'));
    allCategoryNames = ['all', ...categories];
    renderCategories();
}

function renderCategories() {
    const c = document.getElementById('categories');
    const isCM = sidebarFocusMode === 'categories' && sidebarVisible;
    const allCount = channels.length;
    let html = `<button class="cat-btn ${currentCategory==='all'?'active':''} ${isCM&&focusedCategoryIndex===0?'cat-focused':''}"
        onclick="selectCategory('all')">Tümü <span class="cat-count">${allCount}</span></button>`;
    categories.forEach((cat, i) => {
        const count = channels.filter(ch => ch.group === cat).length;
        const ci = i + 1;
        html += `<button class="cat-btn ${currentCategory===cat?'active':''} ${isCM&&focusedCategoryIndex===ci?'cat-focused':''}"
            onclick="selectCategory('${cat.replace(/'/g,"\\'")}')">${cat} <span class="cat-count">${count}</span></button>`;
    });
    c.innerHTML = html;
    if (isCM) {
        const fb = c.querySelector('.cat-focused');
        if (fb) fb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }
}

function selectCategory(cat) {
    currentCategory = cat;
    focusedCategoryIndex = allCategoryNames.indexOf(cat);
    if (focusedCategoryIndex === -1) focusedCategoryIndex = 0;
    renderCategories(); filterChannels();
    focusedChannelIndex = 0;
    forceRebuildList();
}

function filterChannels() {
    filteredChannels = channels.filter(ch => currentCategory === 'all' || ch.group === currentCategory);
    document.getElementById('channelCount').textContent = `${filteredChannels.length} kanal`;
}

function getListHash() {
    return currentCategory + '|' + filteredChannels.length + '|' + currentChannelIndex;
}

function forceRebuildList() {
    const c = document.getElementById('channelList');
    c.dataset.listHash = '';
    renderChannelList();
}

function renderChannelList() {
    const container = document.getElementById('channelList');
    if (filteredChannels.length === 0) {
        container.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-dim);">
            <div style="font-size:40px;margin-bottom:12px;">📭</div><div>Kanal bulunamadı</div></div>`;
        container.dataset.listHash = getListHash();
        return;
    }
    const hash = getListHash();
    if (container.dataset.listHash !== hash) {
        const isCM = sidebarFocusMode === 'channels';
        let html = '';
        filteredChannels.forEach((ch, i) => {
            const isActive = currentChannelIndex === ch.index;
            const isFocused = focusedChannelIndex === i && sidebarVisible && isCM;
            const logoContent = ch.logo
                ? `<img src="${ch.logo}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='📺'">`
                : '📺';
            html += `<div class="channel-item${isActive?' active':''}${isFocused?' focused':''}"
                data-idx="${i}" onclick="playChannel(${i})" id="ch-${i}">
                <div class="channel-num">${ch.number}</div>
                <div class="channel-logo">${logoContent}</div>
                <div class="channel-info">
                    <div class="channel-name">${ch.name}</div>
                    <div class="channel-group">${ch.group||''}</div>
                </div></div>`;
        });
        container.innerHTML = html;
        container.dataset.listHash = hash;
    } else {
        updateFocusUI();
    }
}

function updateFocusUI() {
    const container = document.getElementById('channelList');
    const items = container.children;
    const isCM = sidebarFocusMode === 'channels';
    for (let i = 0; i < items.length; i++) {
        const el = items[i];
        if (!el.dataset || el.dataset.idx === undefined) continue;
        const idx = parseInt(el.dataset.idx);
        const ch = filteredChannels[idx];
        if (!ch) continue;
        const wA = currentChannelIndex === ch.index;
        const wF = idx === focusedChannelIndex && sidebarVisible && isCM;
        if (el.classList.contains('active') !== wA) el.classList.toggle('active', wA);
        if (el.classList.contains('focused') !== wF) el.classList.toggle('focused', wF);
    }
    if (isCM && sidebarVisible) {
        const focusedEl = document.getElementById(`ch-${focusedChannelIndex}`);
        if (focusedEl) {
            const listEl = container;
            const elTop = focusedEl.offsetTop - listEl.offsetTop;
            const elH = focusedEl.offsetHeight;
            const listH = listEl.clientHeight;
            const scrollTop = listEl.scrollTop;
            if (elTop < scrollTop) listEl.scrollTop = elTop;
            else if (elTop + elH > scrollTop + listH) listEl.scrollTop = elTop + elH - listH;
        }
    }
}

// ==================== ÇÖZÜNÜRLÜK ====================
function getResolutionLabel(w, h) {
    if (h >= 2160 || w >= 3840) return '4K UHD';
    if (h >= 1440 || w >= 2560) return '1440p QHD';
    if (h >= 1080 || w >= 1920) return '1080p FHD';
    if (h >= 720 || w >= 1280) return '720p HD';
    if (h >= 576) return '576p SD';
    if (h >= 480) return '480p SD';
    if (h >= 360) return '360p';
    if (h > 0) return `${h}p`;
    return '';
}

function updateResolutionDisplay(resText) {
    currentResolution = resText;
    const resEl = document.getElementById('overlayResolution');
    const resTxt = document.getElementById('overlayResText');
    if (resText) {
        resTxt.textContent = resText;
        resEl.style.display = 'inline-flex';
    } else {
        resEl.style.display = 'none';
    }
    document.getElementById('nowPlayingRes').textContent = resText ? `• ${resText}` : '';
}

function startResolutionMonitor() {
    if (resolutionChecker) clearInterval(resolutionChecker);
    const video = document.getElementById('videoPlayer');
    currentResolution = '';
    updateResolutionDisplay('');

    resolutionChecker = setInterval(() => {
        if (video.videoWidth > 0 && video.videoHeight > 0) {
            const w = video.videoWidth;
            const h = video.videoHeight;
            const label = getResolutionLabel(w, h);
            const newRes = `${w}×${h} ${label}`;
            if (newRes !== currentResolution) {
                updateResolutionDisplay(newRes);
                // Overlay açıksa güncelle
                const overlay = document.getElementById('channelOverlay');
                if (overlay.style.display === 'block') {
                    // Overlay zaten açıksa resolution güncellenir otomatik
                }
            }
        }
    }, 1500);
}

// ==================== PLAYER ====================
function playChannel(filteredIndex) {
    const channel = filteredChannels[filteredIndex];
    if (!channel) return;

    currentChannelIndex = channel.index;
    focusedChannelIndex = filteredIndex;

    const video = document.getElementById('videoPlayer');
    const url = channel.url;

    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    if (stallChecker) { clearInterval(stallChecker); stallChecker = null; }
    if (resolutionChecker) { clearInterval(resolutionChecker); resolutionChecker = null; }

    video.removeAttribute('src');
    video.load();
    updateResolutionDisplay('');

    document.getElementById('welcomeScreen').style.display = 'none';
    document.getElementById('bufferingSpinner').style.display = 'block';

    const isHLS = /\.m3u8/i.test(url) || /m3u8/i.test(url);

    if (isHLS && Hls.isSupported()) {
        hlsInstance = new Hls({
            maxBufferLength: 30,
            maxMaxBufferLength: 60,
            maxBufferSize: 30 * 1000 * 1000,
            maxBufferHole: 0.3,
            manifestLoadingTimeOut: 12000,
            manifestLoadingMaxRetry: 3,
            manifestLoadingRetryDelay: 500,
            levelLoadingTimeOut: 12000,
            levelLoadingMaxRetry: 3,
            levelLoadingRetryDelay: 500,
            fragLoadingTimeOut: 20000,
            fragLoadingMaxRetry: 4,
            fragLoadingRetryDelay: 500,
            enableWorker: true,
            lowLatencyMode: false,
            startFragPrefetch: true,
            progressive: true,
            testBandwidth: true,
            abrEwmaDefaultEstimate: 1000000,
            abrBandWidthFactor: 0.9,
            abrBandWidthUpFactor: 0.7,
            liveSyncDurationCount: 3,
            liveMaxLatencyDurationCount: 6,
            liveDurationInfinity: true,
            backBufferLength: 20,
            nudgeOffset: 0.2,
            nudgeMaxRetry: 5,
            startPosition: -1,
        });

        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(video);

        hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play().catch(() => {});
        });

        hlsInstance.on(Hls.Events.FRAG_BUFFERED, () => {
            document.getElementById('bufferingSpinner').style.display = 'none';
        });

        hlsInstance.on(Hls.Events.ERROR, (e, data) => {
            if (data.fatal) {
                switch (data.type) {
                    case Hls.ErrorTypes.NETWORK_ERROR:
                        showToast('🔄', 'Bağlantı sorunu, tekrar deneniyor...');
                        setTimeout(() => hlsInstance && hlsInstance.startLoad(), 2000);
                        break;
                    case Hls.ErrorTypes.MEDIA_ERROR:
                        hlsInstance.recoverMediaError();
                        break;
                    default:
                        showToast('❌', 'Kanal yüklenemedi');
                        document.getElementById('bufferingSpinner').style.display = 'none';
                        break;
                }
            }
            if (data.details === 'bufferStalledError' && video.currentTime > 0) video.currentTime += 0.1;
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl') && isHLS) {
        video.src = url;
        video.play().catch(() => {});
    } else {
        video.src = url;
        video.play().catch(() => {});
    }

    video.onplaying = () => {
        document.getElementById('bufferingSpinner').style.display = 'none';
        isPlaying = true;
        document.getElementById('playPauseBtn').textContent = '⏸';
    };
    video.onwaiting = () => { document.getElementById('bufferingSpinner').style.display = 'block'; };
    video.oncanplaythrough = () => { document.getElementById('bufferingSpinner').style.display = 'none'; };
    video.onerror = () => {
        document.getElementById('bufferingSpinner').style.display = 'none';
        if (stallChecker) { clearInterval(stallChecker); stallChecker = null; }
        if (resolutionChecker) { clearInterval(resolutionChecker); resolutionChecker = null; }
        showToast('❌', 'Bu kanal oynatılamıyor');
    };

    // Stall recovery
    let lastTime = -1, stallCount = 0;
    stallChecker = setInterval(() => {
        if (video.paused || video.ended || !isPlaying) return;
        if (video.currentTime === lastTime && video.readyState >= 2) {
            stallCount++;
            if (stallCount >= 2) {
                const buffered = video.buffered;
                if (buffered.length > 0) {
                    const end = buffered.end(buffered.length - 1);
                    if (end > video.currentTime + 0.5) video.currentTime += 0.3;
                }
                stallCount = 0;
            }
        } else { stallCount = 0; }
        lastTime = video.currentTime;
    }, 4000);

    // Gerçek çözünürlük takibi başlat
    startResolutionMonitor();

    document.getElementById('nowPlayingText').textContent = channel.name;
    showChannelOverlay(channel);
    forceRebuildList();

    if (window.innerWidth <= 768 || sidebarOverlayMode) {
        setTimeout(() => hideSidebar(), 600);
    } else {
        setTimeout(() => { sidebarOverlayMode = true; hideSidebar(); }, 800);
    }
    showToast('▶️', channel.name);
}

function playNextChannel() {
    if (!filteredChannels.length) return;
    focusedChannelIndex = (focusedChannelIndex + 1) % filteredChannels.length;
    playChannel(focusedChannelIndex);
}

function playPrevChannel() {
    if (!filteredChannels.length) return;
    focusedChannelIndex = focusedChannelIndex <= 0 ? filteredChannels.length - 1 : focusedChannelIndex - 1;
    playChannel(focusedChannelIndex);
}

function togglePlayPause() {
    const v = document.getElementById('videoPlayer');
    if (v.paused) { v.play(); isPlaying = true; document.getElementById('playPauseBtn').textContent = '⏸'; }
    else { v.pause(); isPlaying = false; document.getElementById('playPauseBtn').textContent = '▶️'; }
}

function toggleMute() {
    const v = document.getElementById('videoPlayer');
    v.muted = !v.muted;
    document.getElementById('muteBtn').textContent = v.muted ? '🔇' : '🔊';
    document.getElementById('volumeSlider').value = v.muted ? 0 : v.volume * 100;
}

function setVolume(val) {
    const v = document.getElementById('videoPlayer');
    v.volume = val / 100; v.muted = val == 0;
    document.getElementById('muteBtn').textContent = val == 0 ? '🔇' : (val < 50 ? '🔉' : '🔊');
}

function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
    else document.exitFullscreen();
}

// ==================== SIDEBAR ====================
function toggleSidebar() { sidebarVisible ? hideSidebar() : showSidebar(); }

function showSidebar() {
    const s = document.getElementById('sidebar');
    s.classList.remove('hidden');
    if (sidebarOverlayMode) s.classList.add('overlay-mode');
    sidebarVisible = true;
    sidebarFocusMode = 'channels';
    updateFocusModeIndicator();
    forceRebuildList();
    renderCategories();
}

function hideSidebar() {
    document.getElementById('sidebar').classList.add('hidden');
    sidebarVisible = false;
    sidebarFocusMode = 'channels';
    updateFocusModeIndicator();
}

function updateFocusModeIndicator() {
    document.getElementById('focusModeIndicator').classList.toggle('show', sidebarVisible && sidebarFocusMode === 'categories');
}

function showChannelOverlay(channel) {
    const o = document.getElementById('channelOverlay');
    document.getElementById('overlayName').textContent = `${channel.number}. ${channel.name}`;
    document.getElementById('overlayGroup').textContent = channel.group || '';
    o.style.display = 'block';
    clearTimeout(overlayTimeout);
    overlayTimeout = setTimeout(() => { o.style.display = 'none'; }, 5000);
}

// ==================== CONTROLS ====================
function setupMouseEvents() {
    const p = document.getElementById('playerArea');
    p.addEventListener('mousemove', showControls);
    p.addEventListener('click', (e) => {
        if (e.target === document.getElementById('videoPlayer') || e.target === document.getElementById('videoContainer')) showControls();
    });
    p.addEventListener('touchstart', showControls, { passive: true });
}

function showControls() {
    const c = document.getElementById('playerControls');
    c.classList.add('visible');
    clearTimeout(controlsTimeout);
    controlsTimeout = setTimeout(() => c.classList.remove('visible'), 4000);
}

// ==================== TOUCH GESTURES (MOBİL) ====================
function setupTouchGestures() {
    let touchStartX = 0;
    let touchStartY = 0;
    let touchStartTime = 0;

    const player = document.getElementById('playerArea');

    player.addEventListener('touchstart', (e) => {
        if (e.target.closest('#playerControls') || e.target.closest('#channelOverlay')) return;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        touchStartTime = Date.now();
    }, { passive: true });

    player.addEventListener('touchend', (e) => {
        if (e.target.closest('#playerControls') || e.target.closest('#channelOverlay')) return;
        const deltaX = e.changedTouches[0].clientX - touchStartX;
        const deltaY = e.changedTouches[0].clientY - touchStartY;
        const deltaTime = Date.now() - touchStartTime;

        // Swipe detection
        if (deltaTime < 500 && Math.abs(deltaX) > 60 && Math.abs(deltaX) > Math.abs(deltaY)) {
            if (deltaX > 0) {
                // Sağa swipe → sidebar aç
                if (!sidebarVisible) {
                    sidebarOverlayMode = true;
                    showSidebar();
                }
            } else {
                // Sola swipe → sidebar kapat
                if (sidebarVisible) hideSidebar();
            }
        }
    }, { passive: true });

    // Sidebar'da swipe
    const sidebar = document.getElementById('sidebar');
    let sbTouchStartX = 0;

    sidebar.addEventListener('touchstart', (e) => {
        sbTouchStartX = e.touches[0].clientX;
    }, { passive: true });

    sidebar.addEventListener('touchend', (e) => {
        const deltaX = e.changedTouches[0].clientX - sbTouchStartX;
        if (deltaX < -60) {
            hideSidebar();
        }
    }, { passive: true });
}

// ==================== KEYBOARD / TV REMOTE ====================
function setupEventListeners() {
    document.addEventListener('keydown', handleKeydown);
}

function handleKeydown(e) {
    const ae = document.activeElement;
    const isInput = ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.tagName === 'SELECT');
    if (isInput) { if (e.key === 'Escape') { ae.blur(); e.preventDefault(); } return; }

    switch (e.key) {
        case 'ArrowLeft':
            e.preventDefault();
            if (sidebarVisible) {
                if (sidebarFocusMode === 'channels') {
                    sidebarFocusMode = 'categories';
                    focusedCategoryIndex = allCategoryNames.indexOf(currentCategory);
                    if (focusedCategoryIndex < 0) focusedCategoryIndex = 0;
                    updateFocusModeIndicator(); renderCategories(); updateFocusUI();
                } else {
                    if (focusedCategoryIndex > 0) { focusedCategoryIndex--; renderCategories(); }
                }
            } else {
                sidebarOverlayMode = true; showSidebar();
            }
            break;

        case 'ArrowRight':
            e.preventDefault();
            if (sidebarVisible) {
                if (sidebarFocusMode === 'categories') {
                    if (focusedCategoryIndex < allCategoryNames.length - 1) { focusedCategoryIndex++; renderCategories(); }
                } else { hideSidebar(); }
            }
            break;

        case 'ArrowUp':
            e.preventDefault();
            if (sidebarVisible) {
                if (sidebarFocusMode === 'channels') {
                    if (focusedChannelIndex > 0) { focusedChannelIndex--; updateFocusUI(); }
                }
            } else { playPrevChannel(); }
            break;

        case 'ArrowDown':
            e.preventDefault();
            if (sidebarVisible) {
                if (sidebarFocusMode === 'channels') {
                    if (focusedChannelIndex < filteredChannels.length - 1) { focusedChannelIndex++; updateFocusUI(); }
                } else if (sidebarFocusMode === 'categories') {
                    const catName = allCategoryNames[focusedCategoryIndex];
                    if (catName !== currentCategory) selectCategory(catName);
                    sidebarFocusMode = 'channels';
                    focusedChannelIndex = 0;
                    updateFocusModeIndicator(); renderCategories(); forceRebuildList();
                }
            } else { playNextChannel(); }
            break;

        case 'Enter':
            e.preventDefault();
            if (sidebarVisible) {
                if (sidebarFocusMode === 'categories') {
                    const catName = allCategoryNames[focusedCategoryIndex];
                    selectCategory(catName);
                    sidebarFocusMode = 'channels';
                    focusedChannelIndex = 0;
                    updateFocusModeIndicator(); renderCategories(); forceRebuildList();
                    showToast('📂', `${catName === 'all' ? 'Tümü' : catName}`);
                } else if (filteredChannels.length > 0) {
                    playChannel(focusedChannelIndex);
                }
            }
            break;

        case 'Escape': case 'Backspace':
            e.preventDefault();
            if (sidebarVisible) {
                if (sidebarFocusMode === 'categories') {
                    sidebarFocusMode = 'channels';
                    updateFocusModeIndicator(); renderCategories(); updateFocusUI();
                } else { hideSidebar(); }
            }
            break;

        case ' ': e.preventDefault(); togglePlayPause(); break;
        case 'm': case 'M': e.preventDefault(); toggleMute(); break;
        case 'f': case 'F': e.preventDefault(); toggleFullscreen(); break;
        case 's': case 'S': e.preventDefault(); toggleSidebar(); break;
        case 'Tab':
            e.preventDefault();
            if (sidebarVisible) {
                if (sidebarFocusMode === 'channels') {
                    sidebarFocusMode = 'categories';
                    focusedCategoryIndex = allCategoryNames.indexOf(currentCategory);
                    if (focusedCategoryIndex < 0) focusedCategoryIndex = 0;
                } else { sidebarFocusMode = 'channels'; }
                updateFocusModeIndicator(); renderCategories(); updateFocusUI();
            }
            break;
        case '+': case '=': e.preventDefault(); adjustVolume(5); break;
        case '-': case '_': e.preventDefault(); adjustVolume(-5); break;
        case 'PageUp': e.preventDefault(); playPrevChannel(); break;
        case 'PageDown': e.preventDefault(); playNextChannel(); break;
        default:
            if (e.key >= '0' && e.key <= '9') { e.preventDefault(); handleNumberInput(e.key); }
            break;
    }
}

function adjustVolume(delta) {
    const v = document.getElementById('videoPlayer');
    let nv = Math.max(0, Math.min(1, v.volume + delta / 100));
    v.volume = nv; v.muted = nv === 0;
    document.getElementById('volumeSlider').value = nv * 100;
    document.getElementById('muteBtn').textContent = nv === 0 ? '🔇' : (nv < 0.5 ? '🔉' : '🔊');
    showToast('🔊', `Ses: %${Math.round(nv * 100)}`);
}

function handleNumberInput(digit) {
    numberBuffer += digit;
    document.getElementById('numberDisplay').textContent = numberBuffer;
    document.getElementById('numberOverlay').style.display = 'block';
    clearTimeout(numberTimeout);
    numberTimeout = setTimeout(() => {
        const num = parseInt(numberBuffer);
        numberBuffer = '';
        document.getElementById('numberOverlay').style.display = 'none';
        const idx = filteredChannels.findIndex(ch => ch.number === num);
        if (idx !== -1) { focusedChannelIndex = idx; playChannel(idx); }
        else showToast('⚠️', `${num} numaralı kanal bulunamadı`);
    }, 1500);
}

function showToast(icon, message) {
    const t = document.getElementById('toast');
    document.getElementById('toastContent').innerHTML = `<span>${icon}</span> ${message}`;
    t.style.display = 'block';
    clearTimeout(t._t);
    t._t = setTimeout(() => { t.style.display = 'none'; }, 3000);
}
