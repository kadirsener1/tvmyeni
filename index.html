<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>📺 SENTV - IPTV</title>
    <style>
        /* --- ÖNCEKİ TÜM CSS AYNI KALIYOR (KISALTILDI) --- */
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#6c5ce7;--primary-dark:#5a4bd1;--bg-dark:#0a0a1a;--bg-card:#141428;--bg-sidebar:rgba(10,10,26,0.95);--bg-sidebar-transparent:rgba(10,10,26,0.75);--text:#e0e0e0;--text-dim:#8888aa;--accent:#00cec9;--danger:#ff6b6b;--success:#00b894;--border:rgba(108,92,231,0.3)}
        body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg-dark);color:var(--text);overflow:hidden;height:100vh;width:100vw}
        #loadingScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10000;transition:opacity .5s}
        #loadingScreen.hide{opacity:0;pointer-events:none}
        .loader-logo{font-size:64px;margin-bottom:20px;animation:pulse 1.5s infinite}
        .loader-text{font-size:24px;color:var(--primary);margin-bottom:30px;font-weight:700}
        .loader-bar{width:200px;height:4px;background:var(--bg-card);border-radius:2px;overflow:hidden}
        .loader-bar-inner{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:2px;animation:loadProgress 2s ease-in-out forwards}
        @keyframes loadProgress{0%{width:0%}50%{width:70%}100%{width:100%}}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
        #app{display:flex;height:100vh;width:100vw;position:relative}
        #categorySidebar{position:fixed;left:0;top:0;width:220px;height:100vh;background:var(--bg-sidebar);backdrop-filter:blur(20px);z-index:1001;display:flex;flex-direction:column;transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;border-right:1px solid var(--border)}
        #categorySidebar.hidden{transform:translateX(-100%);opacity:0}
        .cat-sidebar-header{padding:16px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;min-height:60px;background:rgba(108,92,231,.1);flex-shrink:0}
        .cat-sidebar-header .logo{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .cat-list{flex:1;overflow-y:auto;padding:6px 8px}
        .cat-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:10px;cursor:pointer;transition:background .1s,border-color .1s;border:1px solid transparent;margin-bottom:2px;font-size:13px;color:var(--text)}
        .cat-item:hover{background:rgba(108,92,231,.15);border-color:var(--border)}
        .cat-item.active{background:linear-gradient(135deg,rgba(108,92,231,.3),rgba(0,206,201,.15));border-color:var(--primary);color:#fff}
        .cat-item.focused{background:rgba(0,206,201,.12);border-color:var(--accent)}
        .cat-item-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
        .cat-item-count{font-size:10px;background:rgba(255,255,255,.1);padding:2px 8px;border-radius:10px;color:var(--text-dim);flex-shrink:0;margin-left:8px}
        #sidebar{position:fixed;left:0;top:0;width:380px;height:100vh;background:var(--bg-sidebar);backdrop-filter:blur(20px);z-index:1000;display:flex;flex-direction:column;transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;border-right:1px solid var(--border)}
        #sidebar.hidden{transform:translateX(-100%);opacity:0}
        .sidebar-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;min-height:65px;background:rgba(108,92,231,.1);flex-shrink:0}
        .sidebar-header .logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header-actions{display:flex;gap:8px}
        .icon-btn{width:36px;height:36px;border:1px solid var(--border);background:rgba(108,92,231,.15);color:var(--text);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s}
        .icon-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
        .sidebar-cat-label{padding:8px 20px;font-size:12px;color:var(--accent);border-bottom:1px solid rgba(0,206,201,.15);flex-shrink:0;font-weight:700;background:rgba(0,206,201,.05)}
        .channel-list-wrapper{flex:1;overflow:hidden;display:flex;flex-direction:column}
        .channel-count{padding:8px 20px;font-size:12px;color:var(--text-dim);border-bottom:1px solid rgba(255,255,255,.03);flex-shrink:0}
        .channel-list{flex:1;overflow-y:auto;padding:6px 10px}
        .channel-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;cursor:pointer;transition:background .1s,border-color .1s;border:1px solid transparent;margin-bottom:2px}
        .channel-item:hover{background:rgba(108,92,231,.15);border-color:var(--border)}
        .channel-item.active{background:linear-gradient(135deg,rgba(108,92,231,.3),rgba(0,206,201,.15));border-color:var(--primary)}
        .channel-item.focused{background:rgba(0,206,201,.12);border-color:var(--accent)}
        .channel-logo{width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;font-size:20px}
        .channel-logo img{width:100%;height:100%;object-fit:contain}
        .channel-info{flex:1;min-width:0}
        .channel-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .channel-group{font-size:11px;color:var(--text-dim);margin-top:2px}
        .channel-num{font-size:11px;color:var(--text-dim);background:rgba(255,255,255,.05);padding:2px 8px;border-radius:6px;font-weight:600}
        #playerArea{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;position:relative;width:100%;height:100vh}
        #videoContainer{width:100%;height:100%;position:relative;background:#000}
        
        /* === APPCREATOR24 TARZI BASİT VIDEO === */
        #videoPlayer {
            width: 100%;
            height: 100%;
            background: #000;
            object-fit: contain;
            display: block;
        }

        #videoBg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:3;pointer-events:none;background-color:#000;background-image:url('https://raw.githubusercontent.com/kadirsener1/tvmyeni/refs/heads/main/bg.JPG');background-size:cover;background-position:center;background-repeat:no-repeat;transition:opacity .4s ease}
        #videoBg.playing{opacity:0;pointer-events:none}

        #welcomeScreen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.45);z-index:5}
        .welcome-icon{font-size:80px;margin-bottom:20px;animation:float 3s ease-in-out infinite}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        .welcome-title{font-size:28px;font-weight:800;margin-bottom:10px;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .welcome-subtitle{color:var(--text-dim);font-size:16px}
        .welcome-keys{margin-top:30px;display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:650px;padding:0 20px}
        .key-hint{display:flex;align-items:center;gap:8px;color:var(--text-dim);font-size:13px}
        .key-badge{background:rgba(108,92,231,.2);border:1px solid var(--border);padding:4px 10px;border-radius:6px;font-size:12px;color:var(--primary);font-weight:600}

        #channelInfoBar{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent 0%,rgba(0,0,0,.85) 30%,rgba(0,0,0,.95) 100%);padding:40px 30px 24px 30px;z-index:100;display:none}
        .info-bar-content{display:flex;align-items:center;justify-content:space-between;gap:20px}
        .info-bar-left{display:flex;align-items:center;gap:16px;flex:1;min-width:0}
        .info-bar-number{font-size:32px;font-weight:800;color:var(--primary);font-variant-numeric:tabular-nums;flex-shrink:0}
        .info-bar-details{flex:1;min-width:0}
        .info-bar-name{font-size:22px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .info-bar-group{font-size:13px;color:var(--accent);margin-top:2px}
        .info-bar-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
        .info-bar-resolution{display:flex;align-items:center;gap:6px;padding:5px 14px;background:rgba(108,92,231,.25);border:1px solid rgba(108,92,231,.4);border-radius:8px;font-size:13px;color:var(--primary);font-weight:700}
        .info-bar-resolution .res-dot{width:8px;height:8px;border-radius:50%;background:var(--success);animation:blink 1.5s infinite}
        .info-bar-live{display:flex;align-items:center;gap:6px;padding:5px 12px;background:rgba(255,107,107,.2);border:1px solid rgba(255,107,107,.3);border-radius:8px;font-size:12px;color:var(--danger);font-weight:700}
        .info-bar-live .live-dot{width:8px;height:8px;border-radius:50%;background:var(--danger);animation:blink 1s infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

        #toast{position:fixed;top:30px;right:30px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:14px 20px;z-index:9999;display:none;animation:toastSlideDown .3s ease;box-shadow:0 10px 30px rgba(0,0,0,.3);max-width:300px}
        @keyframes toastSlideDown{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
        .toast-content{display:flex;align-items:center;gap:10px;font-size:14px}
        #bufferingSpinner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;display:none}
        .spinner{width:50px;height:50px;border:3px solid rgba(108,92,231,.2);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        #numberOverlay{position:absolute;top:30px;right:30px;background:rgba(10,10,26,.9);backdrop-filter:blur(15px);padding:16px 24px;border-radius:14px;border:1px solid var(--border);z-index:200;display:none;text-align:center}
        .number-display{font-size:48px;font-weight:800;color:var(--primary);font-variant-numeric:tabular-nums}
        .number-hint{font-size:12px;color:var(--text-dim);margin-top:4px}
        #mobileMenuBtn{display:none;position:fixed;top:15px;left:15px;z-index:900;width:44px;height:44px;border-radius:12px;background:rgba(10,10,26,.9);border:1px solid var(--border);color:var(--text);font-size:20px;cursor:pointer;align-items:center;justify-content:center;backdrop-filter:blur(10px)}

        @media(max-width:768px){
            #categorySidebar,#sidebar{width:100%;border-right:none}
            #mobileMenuBtn{display:flex}
        }
    </style>
</head>
<body>
<div id="loadingScreen">
    <div class="loader-logo">📺</div>
    <div class="loader-text">SENTV</div>
    <div class="loader-bar"><div class="loader-bar-inner"></div></div>
</div>
<div id="toast"><div class="toast-content" id="toastContent"></div></div>
<button id="mobileMenuBtn" onclick="toggleSidebar()">☰</button>
<div id="app">
    <!-- Sidebar ve Kategori Sidebar aynı kalıyor (kısaltıldı) -->
    <div id="categorySidebar" class="hidden">
        <div class="cat-sidebar-header">
            <div class="logo"><span>📂</span> Kategoriler</div>
            <div class="header-actions"><button class="icon-btn" onclick="hideCategorySidebar()">✕</button></div>
        </div>
        <div class="cat-list" id="catList"></div>
    </div>

    <div id="sidebar" class="hidden">
        <div class="sidebar-header">
            <div class="logo"><span>📺</span> SENTV</div>
            <div class="header-actions">
                <button class="icon-btn" onclick="showCategorySidebar()">📂</button>
                <button class="icon-btn" onclick="hideSidebar()">✕</button>
            </div>
        </div>
        <div class="sidebar-cat-label" id="sidebarCatLabel">📂 Tümü</div>
        <div class="channel-list-wrapper">
            <div class="channel-count" id="channelCount">0 kanal</div>
            <div class="channel-list" id="channelList"></div>
        </div>
    </div>

    <div id="playerArea">
        <div id="videoContainer">
            <div id="videoBg"></div>
            
            <!-- === APPCREATOR24 DEFAULT PLAYER === -->
            <video id="videoPlayer" 
                   controls 
                   autoplay 
                   playsinline 
                   webkit-playsinline
                   style="width:100%;height:100%;background:#000;object-fit:contain;">
            </video>
            
            <div id="welcomeScreen">
                <div class="welcome-icon">📺</div>
                <div class="welcome-title">SENTV</div>
                <div class="welcome-subtitle">Bir kanal seçerek izlemeye başlayın</div>
            </div>
            <div id="bufferingSpinner"><div class="spinner"></div></div>
            <div id="channelInfoBar">
                <div class="info-bar-content">
                    <div class="info-bar-left">
                        <div class="info-bar-number" id="infoBarNumber"></div>
                        <div class="info-bar-details">
                            <div class="info-bar-name" id="infoBarName"></div>
                            <div class="info-bar-group" id="infoBarGroup"></div>
                        </div>
                    </div>
                    <div class="info-bar-right">
                        <div class="info-bar-resolution" id="infoBarRes" style="display:none">
                            <div class="res-dot"></div><span id="infoBarResText"></span>
                        </div>
                        <div class="info-bar-live"><div class="live-dot"></div>CANLI</div>
                    </div>
                </div>
            </div>
            <div id="numberOverlay">
                <div class="number-display" id="numberDisplay"></div>
                <div class="number-hint">Kanal numarası</div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<script>
// ==================== APPCREATOR24 TARZI BASİT PLAYER ====================

const M3U_URL = 'https://raw.githubusercontent.com/kadirsener1/avva/refs/heads/main/playlist.m3u';
let channels = [], filteredChannels = [], categories = [], allCategoryNames = [];
let currentCategory = 'all', currentChannelIndex = -1, focusedChannelIndex = 0;
let sidebarVisible = false, catSidebarVisible = false;
let hlsInstance = null;
let currentPlayingUrl = '';
let focusMode = 'none';
let overlayTimeout = null;

// ==================== YÜKLEME ====================
document.addEventListener('DOMContentLoaded', async () => {
    await loadM3U(M3U_URL);
    setTimeout(() => {
        document.getElementById('loadingScreen').classList.add('hide');
        showCategorySidebar();
    }, 2000);
    setupEventListeners();
    setupTouchGestures();
});

async function loadM3U(url) {
    try {
        const r = await fetch(url);
        channels = parseM3U(await r.text());
    } catch (e) {
        try {
            const r = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(url));
            channels = parseM3U(await r.text());
        } catch (e2) {
            channels = [];
            showToast('❌', 'M3U yüklenemedi');
            return;
        }
    }
    channels.forEach((c, i) => { c.index = i; c.number = i + 1; });
    extractCategories();
    filterChannels();
    forceRebuildList();
    showToast('✅', `${channels.length} kanal yüklendi`);
}

function parseM3U(t) {
    const lines = t.split('\n'), p = [];
    let c = null;
    for (let i = 0; i < lines.length; i++) {
        const l = lines[i].trim();
        if (l.startsWith('#EXTINF:')) {
            c = {};
            const nm = l.match(/tvg-name="([^"]*)"/), lg = l.match(/tvg-logo="([^"]*)"/),
                  gr = l.match(/group-title="([^"]*)"/), tl = l.match(/,(.+)$/);
            c.name = nm ? nm[1] : (tl ? tl[1].trim() : 'Bilinmeyen');
            c.logo = lg ? lg[1] : '';
            c.group = gr ? gr[1] : 'Diğer';
        } else if (l && !l.startsWith('#') && c) {
            c.url = l;
            if (c.name && c.url) p.push(c);
            c = null;
        }
    }
    return p;
}

// ==================== KATEGORİ VE KANAL LİSTESİ ====================
function extractCategories() {
    const s = new Set();
    channels.forEach(c => { if (c.group) s.add(c.group); });
    categories = Array.from(s);
    allCategoryNames = ['all', ...categories];
    renderCatList();
}

function renderCatList() {
    const container = document.getElementById('catList');
    let h = `<div class="cat-item${currentCategory==='all'?' active':''}" onclick="selectCategoryFromList('all')">
        <span class="cat-item-name">📺 Tümü</span>
        <span class="cat-item-count">${channels.length}</span>
    </div>`;
    categories.forEach(cat => {
        const cnt = channels.filter(c => c.group === cat).length;
        h += `<div class="cat-item${currentCategory===cat?' active':''}" onclick="selectCategoryFromList('${cat.replace(/'/g,"\\'")}')">
            <span class="cat-item-name">${cat}</span>
            <span class="cat-item-count">${cnt}</span>
        </div>`;
    });
    container.innerHTML = h;
}

function selectCategoryFromList(cat) {
    currentCategory = cat;
    filterChannels();
    focusedChannelIndex = 0;
    renderCatList();
    hideCategorySidebar();
    showSidebar();
    forceRebuildList();
}

function filterChannels() {
    filteredChannels = channels.filter(c => currentCategory === 'all' || c.group === currentCategory);
    document.getElementById('channelCount').textContent = `${filteredChannels.length} kanal`;
}

function forceRebuildList() {
    document.getElementById('channelList').innerHTML = '';
    renderChannelList();
}

function renderChannelList() {
    const container = document.getElementById('channelList');
    if (!filteredChannels.length) {
        container.innerHTML = `<div style="text-align:center;padding:40px;color:#888">Kanal bulunamadı</div>`;
        return;
    }
    let h = '';
    filteredChannels.forEach((ch, i) => {
        const isA = currentChannelIndex === ch.index;
        const logo = ch.logo ? `<img src="${ch.logo}" onerror="this.parentElement.innerHTML='📺'">` : '📺';
        h += `<div class="channel-item${isA ? ' active' : ''}" data-idx="${i}" onclick="playChannel(${i})">
            <div class="channel-num">${ch.number}</div>
            <div class="channel-logo">${logo}</div>
            <div class="channel-info">
                <div class="channel-name">${ch.name}</div>
                <div class="channel-group">${ch.group || ''}</div>
            </div>
        </div>`;
    });
    container.innerHTML = h;
}

// ==================== APPCREATOR24 TARZI OYNATMA ====================
function playChannel(fi) {
    const ch = filteredChannels[fi];
    if (!ch) return;

    currentChannelIndex = ch.index;
    focusedChannelIndex = fi;
    currentPlayingUrl = ch.url;

    const video = document.getElementById('videoPlayer');
    const url = ch.url;

    // Önceki HLS'i temizle
    if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
    }
    video.pause();
    video.removeAttribute('src');
    video.innerHTML = '';

    document.getElementById('welcomeScreen').style.display = 'none';
    document.getElementById('bufferingSpinner').style.display = 'block';
    document.getElementById('videoBg').classList.add('playing');

    const isHLS = url.includes('.m3u8') || url.includes('m3u8');

    if (isHLS && Hls.isSupported()) {
        // Appcreator24 tarzı basit HLS.js kullanımı
        hlsInstance = new Hls();
        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(video);
        hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play().catch(() => {});
            document.getElementById('bufferingSpinner').style.display = 'none';
        });
    } else {
        // Native oynatma
        video.src = url;
        video.play().catch(() => {});
        document.getElementById('bufferingSpinner').style.display = 'none';
    }

    showChannelInfoBar(ch);
    forceRebuildList();
    setTimeout(() => hideAllSidebars(), 400);
    showToast('▶️', ch.name);
}

function showChannelInfoBar(ch) {
    document.getElementById('infoBarNumber').textContent = ch.number;
    document.getElementById('infoBarName').textContent = ch.name;
    document.getElementById('infoBarGroup').textContent = ch.group || '';
    const bar = document.getElementById('channelInfoBar');
    bar.style.display = 'block';
    clearTimeout(overlayTimeout);
    overlayTimeout = setTimeout(() => bar.style.display = 'none', 5000);
}

// ==================== KONTROL FONKSİYONLARI ====================
function playNextChannel() {
    if (!filteredChannels.length) return;
    focusedChannelIndex = (focusedChannelIndex + 1) % filteredChannels.length;
    playChannel(focusedChannelIndex);
}
function playPrevChannel() {
    if (!filteredChannels.length) return;
    focusedChannelIndex = focusedChannelIndex <= 0 ? filteredChannels.length - 1 : focusedChannelIndex - 1;
    playChannel(focusedChannelIndex);
}

// ==================== SIDEBAR ====================
function showSidebar() {
    document.getElementById('sidebar').classList.remove('hidden');
    sidebarVisible = true;
    forceRebuildList();
}
function hideSidebar() {
    document.getElementById('sidebar').classList.add('hidden');
    sidebarVisible = false;
}
function showCategorySidebar() {
    hideSidebar();
    document.getElementById('categorySidebar').classList.remove('hidden');
    catSidebarVisible = true;
}
function hideCategorySidebar() {
    document.getElementById('categorySidebar').classList.add('hidden');
    catSidebarVisible = false;
}
function hideAllSidebars() {
    hideSidebar();
    hideCategorySidebar();
}
function toggleSidebar() {
    if (sidebarVisible || catSidebarVisible) hideAllSidebars();
    else showCategorySidebar();
}

// ==================== KLAVYE + TOUCH ====================
function setupEventListeners() {
    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight') { e.preventDefault(); showSidebar(); }
        if (e.key === 'ArrowLeft') { e.preventDefault(); hideAllSidebars(); }
        if (e.key === 'ArrowUp' && currentChannelIndex >= 0) playNextChannel();
        if (e.key === 'ArrowDown' && currentChannelIndex >= 0) playPrevChannel();
        if (e.key === 'Enter' && focusMode === 'channels' && filteredChannels.length > 0) playChannel(focusedChannelIndex);
        if ((e.key === 'Escape' || e.key === 'Backspace')) hideAllSidebars();
        if (e.key >= '0' && e.key <= '9') handleNumberInput(e.key);
    });
}

function setupTouchGestures() {
    const pl = document.getElementById('playerArea');
    let startX = 0;
    pl.addEventListener('touchstart', e => startX = e.touches[0].clientX, {passive: true});
    pl.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - startX;
        if (dx > 60) showSidebar();
        if (dx < -60) hideAllSidebars();
    }, {passive: true});
}

function handleNumberInput(d) {
    // Basit kanal numarası girişi
    const num = parseInt(d);
    const idx = filteredChannels.findIndex(c => c.number === num);
    if (idx !== -1) playChannel(idx);
}

function showToast(icon, msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastContent').innerHTML = `<span>${icon}</span> ${msg}`;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2500);
}
</script>
</body>
